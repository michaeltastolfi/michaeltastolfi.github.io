<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Penguin Bopper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:   #1a1426;
    --paper: #f7f1e0;
    --amber: #ffb84d;
    --hot:   #ff6a8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'VT323', monospace;
    color: var(--paper);
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    cursor: pointer;
  }

  /* ── NIGHT SKY ── stepped indigo bands ── */
  body {
    background: linear-gradient(180deg,
      #07081a 0%,    #07081a 9%,
      #0c0d22 9%,    #0c0d22 18%,
      #11132c 18%,   #11132c 27%,
      #161938 27%,   #161938 36%,
      #1b1f43 36%,   #1b1f43 45%,
      #1f254e 45%,   #1f254e 54%,
      #232b5a 54%,   #232b5a 63%,
      #283166 63%,   #283166 72%,
      #2c3870 72%,   #2c3870 100%
    );
    position: relative;
  }

  /* ── STARS ── */
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    animation: twinkle 4s steps(2) infinite;
    z-index: 1;
  }
  .star.plus {
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 1; }
  }

  /* ── MOON (SVG) ── */
  .moon {
    position: absolute;
    top: 7%;
    right: 11%;
    width: 80px;
    height: 80px;
    z-index: 1;
    image-rendering: pixelated;
  }

  /* ── PIXEL LANDSCAPE (raster PNG, scaled up) ── */
  .landscape {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    width: 100%;
    /* Source is now 800x200 (taller image with more snow). */
    aspect-ratio: 800 / 200;
    /* Raised so the snow line comes up to the penguin. */
    max-height: 70%;
    background-image: var(--landscape-img);
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: bottom;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    z-index: 2;
    pointer-events: none;
  }

  /* ── FALLING SNOWFLAKES ── */
  .snowflake {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
    pointer-events: none;
    animation: snow-fall linear infinite;
    z-index: 7;
  }
  .snowflake.small { box-shadow: none; }
  .snowflake.big {
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff,
      -4px 0 0 #fff, 4px 0 0 #fff,
      0 -4px 0 #fff, 0 4px 0 #fff;
  }
  @keyframes snow-fall {
    from { transform: translate(0, -10vh); }
    to   { transform: translate(30px, 110vh); }
  }

  /* ── HEADER ── */
  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 20px 16px 12px;
    text-align: center;
    z-index: 15;
    pointer-events: none;
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3.4vw, 22px);
    line-height: 1.4;
    letter-spacing: 0.05em;
    color: var(--paper);
    text-shadow:
      2px 0 0 var(--ink), -2px 0 0 var(--ink),
      0 2px 0 var(--ink), 0 -2px 0 var(--ink),
      2px 2px 0 var(--ink), -2px 2px 0 var(--ink),
      4px 4px 0 rgba(0,0,0,0.4);
  }
  h1 .dot { color: var(--amber); display: inline-block; margin: 0 4px; }
  .tagline {
    font-family: 'VT323', monospace;
    font-size: 18px;
    margin-top: 12px;
    opacity: 0.85;
    text-shadow: 2px 2px 0 var(--ink);
    letter-spacing: 0.06em;
  }

  /* ── COUNTER PANELS ── */
  .counter-panel {
    position: absolute;
    top: 92px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    z-index: 15;
    pointer-events: none;
  }
  .stat {
    background: #2a2554;
    padding: 8px 14px 6px;
    min-width: 92px;
    text-align: center;
    box-shadow:
      0 0 0 3px var(--ink),
      4px 4px 0 3px rgba(0,0,0,0.45);
  }
  .stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 var(--ink);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'VT323', monospace;
    font-size: 30px;
    line-height: 1;
    text-shadow: 2px 2px 0 var(--ink);
    letter-spacing: 0.04em;
  }
  .stat-value.pop { animation: pop 0.4s steps(3); }
  @keyframes pop {
    0%   { transform: scale(1);   color: var(--paper); }
    33%  { transform: scale(1.3); color: var(--amber); }
    66%  { transform: scale(1.1); color: var(--hot); }
    100% { transform: scale(1);   color: var(--paper); }
  }

  /* ── PENGUIN ── */
  .stage {
    position: absolute;
    inset: 0;
    z-index: 8;
  }
  .penguin-wrap {
    position: absolute;
    bottom: 10%;  /* lowered so feet sit in the snow */
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
  }
  .penguin-sprite {
    --col: 2;
    --row: 1;
    height: clamp(220px, 46vh, 320px);
    aspect-ratio: 1 / 1;
    background-image: var(--sheet);
    background-size: 300% 300%;
    background-position:
      calc(var(--col) * 50%)
      calc(var(--row) * 50%);
    background-repeat: no-repeat;
    filter:
      drop-shadow(0 4px 0 rgba(0,0,0,0.35))
      drop-shadow(0 8px 0 rgba(0,0,0,0.18));
    transform-origin: 50% 95%;
    image-rendering: pixelated;
  }
  .penguin-sprite.idle { animation: breathe 4.5s steps(6) infinite; }
  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.012, 0.985) translateY(-2px); }
  }
  .penguin-sprite.bopped { animation: bop-squash 0.42s steps(5); }
  @keyframes bop-squash {
    0%   { transform: translateY(0)    scaleY(1)    scaleX(1); }
    18%  { transform: translateY(10px) scaleY(0.78) scaleX(1.18); }
    50%  { transform: translateY(-8px) scaleY(1.06) scaleX(0.96); }
    100% { transform: translateY(0)    scaleY(1)    scaleX(1); }
  }
  .penguin-sprite.wobble-l { animation: wobble-l 0.55s steps(6); }
  .penguin-sprite.wobble-r { animation: wobble-r 0.55s steps(6); }
  @keyframes wobble-l {
    0%, 100% { transform: rotate(0); }
    30% { transform: rotate(-8deg); }
    65% { transform: rotate(3deg); }
  }
  @keyframes wobble-r {
    0%, 100% { transform: rotate(0); }
    30% { transform: rotate(8deg); }
    65% { transform: rotate(-3deg); }
  }
  .penguin-sprite.tip-over { animation: tip-over 0.55s steps(7) forwards; }
  @keyframes tip-over {
    0%   { transform: rotate(0) translateY(0); }
    40%  { transform: rotate(-40deg) translateY(4px); }
    70%  { transform: rotate(-72deg) translateY(12px); }
    100% { transform: rotate(-78deg) translateY(16px); }
  }
  .penguin-sprite.lying {
    transform: rotate(-78deg) translateY(16px);
    animation: lying-still 2.2s steps(4) infinite;
  }
  @keyframes lying-still {
    0%, 100% { transform: rotate(-78deg) translateY(16px); }
    50%      { transform: rotate(-76deg) translateY(18px); }
  }
  .penguin-sprite.sit-up { animation: sit-up 0.5s steps(6) forwards; }
  @keyframes sit-up {
    0%   { transform: rotate(-78deg) translateY(16px); }
    60%  { transform: rotate(8deg) translateY(-6px); }
    100% { transform: rotate(0) translateY(0); }
  }
  .penguin-sprite.shaking { animation: shake-snow 0.85s steps(10); }
  @keyframes shake-snow {
    0%   { transform: rotate(0); }
    15%  { transform: rotate(-14deg); }
    30%  { transform: rotate(12deg); }
    45%  { transform: rotate(-10deg); }
    60%  { transform: rotate(8deg); }
    75%  { transform: rotate(-5deg); }
    90%  { transform: rotate(3deg); }
    100% { transform: rotate(0); }
  }
  .penguin-sprite.pop-up { animation: pop-up 0.55s steps(7); }
  @keyframes pop-up {
    0%   { transform: translateY(8px) scaleY(0.75) scaleX(1.15); }
    35%  { transform: translateY(-18px) scaleY(1.20) scaleX(0.88); }
    70%  { transform: translateY(-4px) scaleY(0.95) scaleX(1.02); }
    100% { transform: translateY(0) scaleY(1) scaleX(1); }
  }

  /* ── SPEECH BUBBLE ── */
  .reaction {
    position: absolute;
    top: -2%;
    left: 78%;
    background: var(--paper);
    color: var(--ink);
    padding: 6px 14px 4px;
    font-family: 'VT323', monospace;
    font-size: 26px;
    line-height: 1;
    letter-spacing: 0.02em;
    box-shadow:
      0 0 0 3px var(--ink),
      4px 4px 0 3px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 9;
  }
  .reaction::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 14px;
    width: 20px;
    height: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='5' height='7' shape-rendering='crispEdges' viewBox='0 0 5 7'><rect width='5' height='1' fill='%23f7f1e0'/><rect width='1' height='2' y='1' fill='%231a1426'/><rect x='1' y='1' width='3' height='2' fill='%23f7f1e0'/><rect x='4' y='1' width='1' height='2' fill='%231a1426'/><rect x='1' y='3' width='1' height='2' fill='%231a1426'/><rect x='2' y='3' width='1' height='2' fill='%23f7f1e0'/><rect x='3' y='3' width='1' height='2' fill='%231a1426'/><rect x='2' y='5' width='1' height='2' fill='%231a1426'/></svg>");
    background-repeat: no-repeat;
    background-size: 100% 100%;
    image-rendering: pixelated;
  }
  .reaction.show {
    opacity: 1;
    transform: translateY(0);
    animation: bubble-pop 0.3s steps(3);
  }
  @keyframes bubble-pop {
    0%   { transform: translateY(4px) scale(0.5); }
    50%  { transform: translateY(-2px) scale(1.15); }
    100% { transform: translateY(0) scale(1); }
  }

  /* ── BOP SPARKS ── */
  .spark {
    position: absolute;
    width: 3px; height: 3px;
    pointer-events: none;
    animation: spark-fly 0.7s steps(6) forwards;
    z-index: 100;
    transform: translate(-50%, -50%);
  }
  .spark.cross {
    background: transparent;
    box-shadow:
      0 0 0 0 #fff,
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff;
  }
  .spark.star {
    background: transparent;
    box-shadow:
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff,
      -6px 0 0 #fff, 6px 0 0 #fff,
      0 -6px 0 #fff, 0 6px 0 #fff;
  }
  .spark.dot { background: #fff; }
  @keyframes spark-fly {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.2); opacity: 0; }
  }

  /* ── SNOW PUFF PARTICLES ── */
  .snow-puff {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    box-shadow:
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff;
    pointer-events: none;
    z-index: 60;
    animation: snow-puff-fly 1.2s steps(10) forwards;
    transform: translate(-50%, -50%);
  }
  .snow-puff.small {
    width: 2px; height: 2px;
    box-shadow: -2px 0 0 #fff, 2px 0 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff;
  }
  @keyframes snow-puff-fly {
    0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
    35%  { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx) * 0.75), calc(-50% + var(--dy) * 0.3 + 38px)) scale(0.5); opacity: 0; }
  }

  /* ── FOOTER ── */
  footer {
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    text-align: center;
    z-index: 15;
    pointer-events: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-shadow: 2px 2px 0 var(--ink);
    opacity: 0.85;
  }
  footer .arrow {
    display: inline-block;
    margin-right: 8px;
    color: var(--amber);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.2; }
  }

  /* ── RESET BUTTON ── */
  .reset-btn {
    position: absolute;
    bottom: 50px; right: 16px;
    background: #2a2554;
    color: var(--paper);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    z-index: 20;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow:
      0 0 0 3px var(--ink),
      3px 3px 0 3px rgba(0,0,0,0.45);
    transition: transform 0.05s steps(2);
  }
  .reset-btn:active {
    transform: translate(2px, 2px);
    box-shadow:
      0 0 0 3px var(--ink),
      1px 1px 0 3px rgba(0,0,0,0.45);
  }
  .reset-btn.armed {
    background: var(--amber);
    color: var(--ink);
    text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

  <!-- ─── MOON ─── -->
  <svg class="moon" viewBox="0 0 32 32" shape-rendering="crispEdges">
    <!-- soft outer glow -->
    <circle cx="16" cy="16" r="15" fill="#fff8e0" opacity="0.07"/>
    <circle cx="16" cy="16" r="12" fill="#fff8e0" opacity="0.12"/>
    <!-- moon body -->
    <circle cx="16" cy="16" r="9" fill="#fff5d8"/>
    <!-- highlight crescent -->
    <circle cx="14" cy="14" r="7" fill="#fffaea"/>
    <!-- craters -->
    <circle cx="13" cy="13" r="1" fill="#e8e0c0"/>
    <circle cx="19" cy="18" r="1.2" fill="#e8e0c0"/>
    <circle cx="17" cy="14" r="0.8" fill="#e8e0c0"/>
    <circle cx="15" cy="19" r="0.6" fill="#e8e0c0"/>
  </svg>
  <div class="landscape"></div>

  <header>
    <h1>PENGUIN<span class="dot">·</span>BOPPER</h1>
    <div class="tagline">~ a study in joyful boops ~</div>
  </header>

  <div class="counter-panel">
    <div class="stat">
      <div class="stat-label">SESSION</div>
      <div class="stat-value" id="session-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">ALL TIME</div>
      <div class="stat-value" id="total-count">---</div>
    </div>
  </div>

  <div class="stage">
    <div class="penguin-wrap" id="penguin-wrap">
      <div class="reaction" id="reaction">Boop!</div>
      <div class="penguin-sprite idle" id="penguin"></div>
    </div>
  </div>

  <footer>
    <span class="arrow">&gt;</span>TAP THE PENGUIN
  </footer>

  <button class="reset-btn" id="reset-btn">RESET</button>

  const FRAMES = {
    DIZZY:        [0, 0],
    PEACEFUL:     [1, 0],
    BOP_WINCE:    [2, 0],
    LOOK_LEFT:    [0, 1],
    ARMS_OUT:     [1, 1],
    IDLE:         [2, 1],
    LYING:        [0, 2],
    HAPPY:        [1, 2],
    LOOK_BACK:    [2, 2],
  };

  let sessionCount = 0;
  let totalCount = 0;
  let recentBops = [];
  let isFallen = false;
  let fallTimers = [];
  let resetTimer = null;
  let blinkTimer = null;
  let glanceTimer = null;
  let armFlapTimer = null;
  let currentFrame = 'IDLE';

  const STORAGE_KEY = 'penguin-bopper-total-bops';

  const $ = (id) => document.getElementById(id);
  const penguin = $('penguin');
  const penguinWrap = $('penguin-wrap');
  const sessionEl = $('session-count');
  const totalEl = $('total-count');
  const reactionEl = $('reaction');

  // Inject image URLs as CSS variables
  const docStyle = document.documentElement.style;
  docStyle.setProperty('--sheet', `url(${SHEET_DATA_URL})`);
  docStyle.setProperty('--landscape-img', `url(${LANDSCAPE_DATA_URL})`);

  function setFrame(name) {
    const [col, row] = FRAMES[name];
    penguin.style.setProperty('--col', col);
    penguin.style.setProperty('--row', row);
    currentFrame = name;
  }
  function clearAnimClasses() {
    penguin.classList.remove('idle', 'bopped', 'wobble-l', 'wobble-r',
                             'tip-over', 'lying', 'sit-up', 'shaking', 'pop-up');
    void penguin.offsetWidth;
  }
  function clearFallTimers() {
    fallTimers.forEach(clearTimeout);
    fallTimers = [];
  }

  // ─── STORAGE ──────────────────────────────────────────────
  // Uses localStorage (works on any web page), with fallback to
  // window.storage (Claude artifacts) if localStorage is unavailable.
  function loadTotal() {
    let value = null;
    try {
      value = localStorage.getItem(STORAGE_KEY);
    } catch (e) {}
    if (value === null && window.storage && window.storage.get) {
      // Fallback for Claude artifacts environment
      window.storage.get(STORAGE_KEY).then(r => {
        if (r && r.value) {
          totalCount = parseInt(r.value, 10) || 0;
          totalEl.textContent = totalCount.toLocaleString();
        }
      }).catch(() => {});
      return;
    }
    totalCount = parseInt(value, 10) || 0;
    totalEl.textContent = totalCount.toLocaleString();
  }
  function saveTotal() {
    try {
      localStorage.setItem(STORAGE_KEY, String(totalCount));
    } catch (e) {
      // Fallback to window.storage
      if (window.storage && window.storage.set) {
        try { window.storage.set(STORAGE_KEY, String(totalCount)); } catch (e2) {}
      }
    }
  }

  // ─── AUDIO ─────────────────────────────────────────────────
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    return audioCtx;
  }
  function playBop(intensity) {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    const base = 520 + Math.min(intensity * 40, 240);
    osc.frequency.setValueAtTime(base * 0.7, now);
    osc.frequency.exponentialRampToValueAtTime(base, now + 0.04);
    osc.frequency.exponentialRampToValueAtTime(base * 1.4, now + 0.1);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.12, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.22);
  }
  function playRecover() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    [440, 660, 880, 1320].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = now + i * 0.06;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.10, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.24);
    });
  }
  function playLandThump() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.2);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.25, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.32);
  }

    heavy:   ['Wheee!', 'Spin spin!', 'Dizzy fun!', 'So bouncy!', 'Tumble time!', 'Woohoo!', 'Floof!'],
    fallen:  ['Plop!', 'Snow nap~', 'I am potato.', 'Cozy!', 'Belly-up!', 'Snoozy.', 'Floof down!'],
    shaking: ['Brrr!', 'Snow flurry!', 'Shake shake!', 'Flffp!'],
    recover: ['Tada!', 'Boing back!', 'Ready!', 'BOOM!', 'Hop hop!']
  };
  function pickReaction(cat) {
    const list = reactions[cat];
    return list[Math.floor(Math.random() * list.length)];
  }
  function showReaction(text, ms = 1100) {
    reactionEl.textContent = text;
    reactionEl.classList.remove('show');
    void reactionEl.offsetWidth;
    reactionEl.classList.add('show');
    clearTimeout(reactionEl._t);
    reactionEl._t = setTimeout(() => reactionEl.classList.remove('show'), ms);
  }

  const SPARK_TYPES = ['cross', 'star', 'dot', 'cross', 'dot'];
  function emitSparks(x, y, count = 6) {
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      const t = SPARK_TYPES[Math.floor(Math.random() * SPARK_TYPES.length)];
      s.className = 'spark ' + t;
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.6;
      const dist = 36 + Math.random() * 44;
      s.style.left = x + 'px';
      s.style.top = y + 'px';
      const color = ['#ffffff', '#ffe09a', '#ffb84d', '#ff9466'][Math.floor(Math.random() * 4)];
      if (t === 'dot') {
        s.style.background = color;
      } else {
        const shadows = t === 'star'
          ? `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}, -6px 0 0 ${color}, 6px 0 0 ${color}, 0 -6px 0 ${color}, 0 6px 0 ${color}`
          : `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}, 0 0 0 ${color}`;
        s.style.boxShadow = shadows;
      }
      s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }
  }

  function emitSnowPuff(count, source = 'feet', spread = 'fan') {
    const rect = penguinWrap.getBoundingClientRect();
    let x = rect.left + rect.width / 2;
    let y;
    if (source === 'feet')  y = rect.bottom - 4;
    else if (source === 'head') y = rect.top + rect.height * 0.25;
    else if (source === 'wide') y = rect.bottom;
    else y = rect.bottom;

    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'snow-puff' + (Math.random() < 0.4 ? ' small' : '');
      let angle, dist;
      if (spread === 'fan') {
        angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.3;
        dist = 30 + Math.random() * 70;
      } else if (spread === 'wide') {
        angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.8;
        dist = 50 + Math.random() * 90;
      } else if (spread === 'radial') {
        angle = Math.random() * Math.PI * 2;
        dist = 25 + Math.random() * 55;
      }
      s.style.left = (x + (Math.random() - 0.5) * rect.width * 0.4) + 'px';
      s.style.top = y + 'px';
      s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1300);
    }
  }

  function returnToIdle() {
    if (isFallen) return;
    clearAnimClasses();
    setFrame('IDLE');
    penguin.classList.add('idle');
  }
  function scheduleBlink() {
    clearTimeout(blinkTimer);
    blinkTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        setFrame('PEACEFUL');
        setTimeout(() => {
          if (currentFrame === 'PEACEFUL' && !isFallen) setFrame('IDLE');
        }, 150);
      }
      scheduleBlink();
    }, 2800 + Math.random() * 4000);
  }
  function scheduleGlance() {
    clearTimeout(glanceTimer);
    glanceTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        const glance = Math.random() < 0.5 ? 'LOOK_LEFT' : 'LOOK_BACK';
        setFrame(glance);
        setTimeout(() => {
          if (currentFrame === glance && !isFallen) setFrame('IDLE');
        }, 800 + Math.random() * 700);
      }
      scheduleGlance();
    }, 6000 + Math.random() * 7000);
  }
  function scheduleArmFlap() {
    clearTimeout(armFlapTimer);
    armFlapTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        setFrame('ARMS_OUT');
        setTimeout(() => {
          if (currentFrame === 'ARMS_OUT' && !isFallen) setFrame('IDLE');
        }, 600);
      }
      scheduleArmFlap();
    }, 10000 + Math.random() * 12000);
  }

  function lightBop() {
    clearAnimClasses();
    setFrame('BOP_WINCE');
    penguin.classList.add('bopped');
    emitSnowPuff(4, 'feet', 'fan');
    showReaction(pickReaction('light'));
    setTimeout(() => { if (!isFallen) setFrame('PEACEFUL'); }, 220);
    setTimeout(() => { if (!isFallen) setFrame('HAPPY'); }, 380);
    setTimeout(() => { if (!isFallen) returnToIdle(); }, 600);
  }
  function mediumBop() {
    clearAnimClasses();
    setFrame('BOP_WINCE');
    const w = Math.random() < 0.5 ? 'wobble-l' : 'wobble-r';
    penguin.classList.add('bopped', w);
    emitSnowPuff(6, 'feet', 'fan');
    showReaction(pickReaction('medium'));
    setTimeout(() => { if (!isFallen) setFrame('PEACEFUL'); }, 260);
    setTimeout(() => { if (!isFallen) setFrame('ARMS_OUT'); }, 460);
    setTimeout(() => { if (!isFallen) returnToIdle(); }, 720);
  }
  function heavyBop() {
    clearAnimClasses();
    setFrame('BOP_WINCE');
    penguin.classList.add('bopped', 'wobble-r');
    emitSnowPuff(10, 'feet', 'fan');
    showReaction(pickReaction('heavy'));
    setTimeout(() => { if (!isFallen) setFrame('DIZZY'); }, 280);
    setTimeout(() => { if (!isFallen) setFrame('ARMS_OUT'); }, 560);
    setTimeout(() => { if (!isFallen) returnToIdle(); }, 820);
  }

  function fall() {
    clearAnimClasses();
    clearFallTimers();
    isFallen = true;
    recentBops = [];
    showReaction(pickReaction('fallen'), 3600);

    setFrame('BOP_WINCE');
    penguin.classList.add('tip-over');
    emitSnowPuff(5, 'feet', 'fan');

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('LYING');
      penguin.classList.add('lying');
      emitSnowPuff(22, 'wide', 'wide');
      playLandThump();
    }, 550));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('DIZZY');
      penguin.classList.add('sit-up');
      showReaction(pickReaction('shaking'), 900);
    }, 1700));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('DIZZY');
      penguin.classList.add('shaking');
      emitSnowPuff(8, 'head', 'radial');
      setTimeout(() => emitSnowPuff(6, 'head', 'radial'), 200);
      setTimeout(() => emitSnowPuff(5, 'head', 'radial'), 400);
    }, 2250));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('HAPPY');
      penguin.classList.add('pop-up');
      playRecover();
      emitSnowPuff(8, 'feet', 'fan');
      showReaction(pickReaction('recover'), 1100);
    }, 3150));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      isFallen = false;
      returnToIdle();
    }, 3750));
  }

  function recoverEarly() {
    if (!isFallen) return;
    isFallen = false;
    clearFallTimers();
    clearAnimClasses();
    setFrame('HAPPY');
    penguin.classList.add('pop-up');
    playRecover();
    emitSnowPuff(10, 'feet', 'fan');
    showReaction(pickReaction('recover'), 1100);
    setTimeout(returnToIdle, 600);
  }

  function handleBop(event) {
    if (event.target.closest('.reset-btn')) return;
    if (isFallen) { recoverEarly(); return; }

    const now = Date.now();
    recentBops.push(now);
    recentBops = recentBops.filter(t => now - t < 2500);

    sessionCount += 1;
    totalCount += 1;
    updateCounters();
    saveTotal();
    playBop(recentBops.length);

    const x = event.clientX || (event.touches && event.touches[0].clientX) || window.innerWidth / 2;
    const y = event.clientY || (event.touches && event.touches[0].clientY) || window.innerHeight / 2;
    emitSparks(x, y, 5 + Math.min(recentBops.length, 6));

    if (recentBops.length >= 6) fall();
    else if (recentBops.length >= 4) heavyBop();
    else if (recentBops.length >= 2) mediumBop();
    else lightBop();
  }

  function updateCounters() {
    sessionEl.textContent = sessionCount.toLocaleString();
    totalEl.textContent = totalCount.toLocaleString();
    sessionEl.classList.remove('pop');
    totalEl.classList.remove('pop');
    void sessionEl.offsetWidth;
    sessionEl.classList.add('pop');
    totalEl.classList.add('pop');
  }

  function makeStars() {
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star' + (Math.random() < 0.3 ? ' plus' : '');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 45 + '%';
      s.style.animationDelay = (Math.random() * 4) + 's';
      document.body.appendChild(s);
    }
  }
  function makeSnow() {
    for (let i = 0; i < 22; i++) {
      const f = document.createElement('div');
      const sizeClass = Math.random() < 0.4 ? 'small' : (Math.random() < 0.2 ? 'big' : '');
      f.className = 'snowflake' + (sizeClass ? ' ' + sizeClass : '');
      f.style.left = Math.random() * 100 + '%';
      f.style.animationDuration = (10 + Math.random() * 14) + 's';
      f.style.animationDelay = (Math.random() * -20) + 's';
      f.style.opacity = 0.5 + Math.random() * 0.45;
      document.body.appendChild(f);
    }
  }

  const resetBtn = $('reset-btn');
  let resetArmed = false;
  resetBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!resetArmed) {
      resetArmed = true;
      resetBtn.textContent = 'CONFIRM?';
      resetBtn.classList.add('armed');
      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        resetArmed = false;
        resetBtn.textContent = 'RESET';
        resetBtn.classList.remove('armed');
      }, 2500);
      return;
    }
    resetArmed = false;
    clearTimeout(resetTimer);
    resetBtn.textContent = 'RESET';
    resetBtn.classList.remove('armed');
    totalCount = 0;
    sessionCount = 0;
    saveTotal();
    updateCounters();
    showReaction('Fresh start!', 1200);
    if (!isFallen) {
      setFrame('HAPPY');
      setTimeout(returnToIdle, 900);
    }
  });

  document.addEventListener('pointerdown', handleBop);

  makeStars();
  makeSnow();
  loadTotal();
  setFrame('IDLE');
  scheduleBlink();
  scheduleGlance();
  scheduleArmFlap();
})();
</script>
</body>
</html>
