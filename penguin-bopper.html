<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Penguin Bopper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:   #1a1426;
    --paper: #f7f1e0;
    --amber: #ffb84d;
    --hot:   #ff6a8a;

    /* ── LAYOUT INVARIANTS ──────────────────────────────────────
       These ensure the arc never overlaps the HUD and the penguin
       always sits in the snow, at ANY viewport size.

       Snow surface sits roughly 18% up from the bottom of the landscape
       PNG. With landscape at 55vh, snow surface = 18% * 55vh ≈ 9.9vh
       from viewport bottom. Penguin at bottom 7% has its feet ~3% above
       its bounding box bottom, so feet end at 10vh from bottom — always
       at or slightly below the snow surface.

       Arc planets are constrained between --arc-min-top (just below the
       HUD) and --arc-max-top (just above the landscape's top edge). On
       very small screens these collapse to a near-flat arc, but they
       can NEVER be hidden by the HUD or the landscape. */
    --landscape-height: 55vh;
    --hud-clearance: 200px;
    --landscape-top: calc(100vh - var(--landscape-height));
    --planet-size: clamp(28px, 7vmin, 60px);
    --planet-half: calc(var(--planet-size) / 2);
    --arc-margin: 12px;
    --arc-min-top: calc(var(--hud-clearance) + var(--planet-half) + var(--arc-margin));
    --arc-max-top: calc(var(--landscape-top) - var(--planet-half) - var(--arc-margin));
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'VT323', monospace;
    color: var(--paper);
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    cursor: pointer;
  }

  /* ── NIGHT SKY ── stepped indigo bands ── */
  body {
    background: linear-gradient(180deg,
      #07081a 0%,    #07081a 9%,
      #0c0d22 9%,    #0c0d22 18%,
      #11132c 18%,   #11132c 27%,
      #161938 27%,   #161938 36%,
      #1b1f43 36%,   #1b1f43 45%,
      #1f254e 45%,   #1f254e 54%,
      #232b5a 54%,   #232b5a 63%,
      #283166 63%,   #283166 72%,
      #2c3870 72%,   #2c3870 100%
    );
    position: relative;
  }

  /* ── STARS ── */
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    animation: twinkle 4s steps(2) infinite;
    z-index: 1;
  }
  .star.plus {
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 1; }
  }

  /* ── MOON (SVG) ── */
  .moon {
    position: absolute;
    top: 7%;
    right: 11%;
    width: 80px;
    height: 80px;
    z-index: 1;
    image-rendering: pixelated;
  }

  /* ── PIXEL LANDSCAPE (raster PNG, scaled up) ── */
  /* Fixed at 55vh on ALL viewports — combined with background-size: cover,
     this guarantees the snow surface lands at a consistent ~10vh from the
     bottom of the viewport regardless of aspect ratio, so the penguin's
     feet always sit in the snow. */
  .landscape {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    width: 100%;
    height: var(--landscape-height);
    background-image: var(--landscape-img);
    background-size: cover;
    background-repeat: no-repeat;
    background-position: bottom center;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    z-index: 2;
    pointer-events: none;
  }

  /* ── FALLING SNOWFLAKES ── */
  .snowflake {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
    pointer-events: none;
    animation: snow-fall linear infinite;
    z-index: 7;
  }
  .snowflake.small { box-shadow: none; }
  .snowflake.big {
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff,
      -4px 0 0 #fff, 4px 0 0 #fff,
      0 -4px 0 #fff, 0 4px 0 #fff;
  }
  @keyframes snow-fall {
    from { transform: translate(0, -10vh); }
    to   { transform: translate(30px, 110vh); }
  }

  /* ── HEADER ── */
  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 20px 16px 12px;
    text-align: center;
    z-index: 15;
    pointer-events: none;
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3.4vw, 22px);
    line-height: 1.4;
    letter-spacing: 0.05em;
    color: var(--paper);
    text-shadow:
      2px 0 0 var(--ink), -2px 0 0 var(--ink),
      0 2px 0 var(--ink), 0 -2px 0 var(--ink),
      2px 2px 0 var(--ink), -2px 2px 0 var(--ink),
      4px 4px 0 rgba(0,0,0,0.4);
  }
  h1 .dot { color: var(--amber); display: inline-block; margin: 0 4px; }
  .tagline {
    font-family: 'VT323', monospace;
    font-size: 18px;
    margin-top: 12px;
    opacity: 0.85;
    text-shadow: 2px 2px 0 var(--ink);
    letter-spacing: 0.06em;
  }

  /* ── COUNTER PANELS ── */
  .counter-panel {
    position: absolute;
    top: 92px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 15;
    pointer-events: none;
  }
  .stats-row {
    display: flex;
    gap: 14px;
  }
  .stat {
    background: #2a2554;
    padding: 8px 14px 6px;
    min-width: 92px;
    text-align: center;
    box-shadow:
      0 0 0 3px var(--ink),
      4px 4px 0 3px rgba(0,0,0,0.45);
  }
  .stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 var(--ink);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'VT323', monospace;
    font-size: 30px;
    line-height: 1;
    text-shadow: 2px 2px 0 var(--ink);
    letter-spacing: 0.04em;
  }
  .stat-value.pop { animation: pop 0.4s steps(3); }
  @keyframes pop {
    0%   { transform: scale(1);   color: var(--paper); }
    33%  { transform: scale(1.3); color: var(--amber); }
    66%  { transform: scale(1.1); color: var(--hot); }
    100% { transform: scale(1);   color: var(--paper); }
  }

  /* ── PROGRESS PANEL ── next achievement bar ── */
  /* Width matches the combined width of the two stat boxes above
     (92 + 14 gap + 92 = 198, plus a hair extra). */
  .progress-panel {
    background: #2a2554;
    padding: 7px 12px 7px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 200px;
    box-shadow:
      0 0 0 3px var(--ink),
      4px 4px 0 3px rgba(0,0,0,0.45);
  }
  .progress-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 var(--ink);
    flex-shrink: 0;
  }
  .progress-track {
    flex: 1;
    height: 10px;
    background: #1a1426;
    box-shadow: inset 0 1px 0 rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: var(--amber);
    width: 0%;
    /* Chunky stepped fill matches the rest of the game's pixel-art animation
       language. 8 visible steps over 0.4s. */
    transition: width 0.4s steps(8);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
  }
  /* Brief flash when the bar hits 100% (just before a threshold celebration) */
  .progress-fill.flash {
    animation: progress-flash 0.4s steps(4);
  }
  @keyframes progress-flash {
    0%, 100% { background: var(--amber); }
    50%      { background: #ffffff; }
  }
  .progress-threshold {
    font-family: 'VT323', monospace;
    font-size: 18px;
    line-height: 1;
    color: var(--amber);
    text-shadow: 1px 1px 0 var(--ink);
    letter-spacing: 0.04em;
    min-width: 56px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── PENGUIN ── */
  .stage {
    position: absolute;
    inset: 0;
    z-index: 8;
  }
  .penguin-wrap {
    position: absolute;
    bottom: 7%;  /* feet sit in snow at any viewport size */
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
  }
  .penguin-sprite {
    --col: 2;
    --row: 1;
    height: clamp(220px, 46vh, 320px);
    aspect-ratio: 1 / 1;
    background-image: var(--sheet);
    background-size: 300% 300%;
    background-position:
      calc(var(--col) * 50%)
      calc(var(--row) * 50%);
    background-repeat: no-repeat;
    filter:
      drop-shadow(0 4px 0 rgba(0,0,0,0.35))
      drop-shadow(0 8px 0 rgba(0,0,0,0.18));
    transform-origin: 50% 95%;
    image-rendering: pixelated;
  }
  .penguin-sprite.idle { animation: breathe 4.5s steps(6) infinite; }
  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.012, 0.985) translateY(-2px); }
  }
  .penguin-sprite.bopped { animation: bop-squash 0.42s steps(5); }
  @keyframes bop-squash {
    0%   { transform: translateY(0)    scaleY(1)    scaleX(1); }
    18%  { transform: translateY(10px) scaleY(0.78) scaleX(1.18); }
    50%  { transform: translateY(-8px) scaleY(1.06) scaleX(0.96); }
    100% { transform: translateY(0)    scaleY(1)    scaleX(1); }
  }
  .penguin-sprite.wobble-l { animation: wobble-l 0.55s steps(6); }
  .penguin-sprite.wobble-r { animation: wobble-r 0.55s steps(6); }
  @keyframes wobble-l {
    0%, 100% { transform: rotate(0); }
    30% { transform: rotate(-8deg); }
    65% { transform: rotate(3deg); }
  }
  @keyframes wobble-r {
    0%, 100% { transform: rotate(0); }
    30% { transform: rotate(8deg); }
    65% { transform: rotate(-3deg); }
  }
  .penguin-sprite.tip-over { animation: tip-over 0.55s steps(7) forwards; }
  @keyframes tip-over {
    0%   { transform: rotate(0) translateY(0); }
    40%  { transform: rotate(-40deg) translateY(4px); }
    70%  { transform: rotate(-72deg) translateY(12px); }
    100% { transform: rotate(-78deg) translateY(16px); }
  }
  .penguin-sprite.lying {
    transform: rotate(-78deg) translateY(16px);
    animation: lying-still 2.2s steps(4) infinite;
  }
  @keyframes lying-still {
    0%, 100% { transform: rotate(-78deg) translateY(16px); }
    50%      { transform: rotate(-76deg) translateY(18px); }
  }
  .penguin-sprite.sit-up { animation: sit-up 0.5s steps(6) forwards; }
  @keyframes sit-up {
    0%   { transform: rotate(-78deg) translateY(16px); }
    60%  { transform: rotate(8deg) translateY(-6px); }
    100% { transform: rotate(0) translateY(0); }
  }
  .penguin-sprite.shaking { animation: shake-snow 0.85s steps(10); }
  @keyframes shake-snow {
    0%   { transform: rotate(0); }
    15%  { transform: rotate(-14deg); }
    30%  { transform: rotate(12deg); }
    45%  { transform: rotate(-10deg); }
    60%  { transform: rotate(8deg); }
    75%  { transform: rotate(-5deg); }
    90%  { transform: rotate(3deg); }
    100% { transform: rotate(0); }
  }
  .penguin-sprite.pop-up { animation: pop-up 0.55s steps(7); }
  @keyframes pop-up {
    0%   { transform: translateY(8px) scaleY(0.75) scaleX(1.15); }
    35%  { transform: translateY(-18px) scaleY(1.20) scaleX(0.88); }
    70%  { transform: translateY(-4px) scaleY(0.95) scaleX(1.02); }
    100% { transform: translateY(0) scaleY(1) scaleX(1); }
  }

  /* ── SPEECH BUBBLE ── */
  .reaction {
    position: absolute;
    top: -2%;
    left: 78%;
    background: var(--paper);
    color: var(--ink);
    padding: 6px 14px 4px;
    font-family: 'VT323', monospace;
    font-size: 26px;
    line-height: 1;
    letter-spacing: 0.02em;
    box-shadow:
      0 0 0 3px var(--ink),
      4px 4px 0 3px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 9;
  }
  .reaction::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 14px;
    width: 20px;
    height: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='5' height='7' shape-rendering='crispEdges' viewBox='0 0 5 7'><rect width='5' height='1' fill='%23f7f1e0'/><rect width='1' height='2' y='1' fill='%231a1426'/><rect x='1' y='1' width='3' height='2' fill='%23f7f1e0'/><rect x='4' y='1' width='1' height='2' fill='%231a1426'/><rect x='1' y='3' width='1' height='2' fill='%231a1426'/><rect x='2' y='3' width='1' height='2' fill='%23f7f1e0'/><rect x='3' y='3' width='1' height='2' fill='%231a1426'/><rect x='2' y='5' width='1' height='2' fill='%231a1426'/></svg>");
    background-repeat: no-repeat;
    background-size: 100% 100%;
    image-rendering: pixelated;
  }
  .reaction.show {
    opacity: 1;
    transform: translateY(0);
    animation: bubble-pop 0.3s steps(3);
  }
  @keyframes bubble-pop {
    0%   { transform: translateY(4px) scale(0.5); }
    50%  { transform: translateY(-2px) scale(1.15); }
    100% { transform: translateY(0) scale(1); }
  }

  /* ── BOP SPARKS ── */
  .spark {
    position: absolute;
    width: 3px; height: 3px;
    pointer-events: none;
    animation: spark-fly 0.7s steps(6) forwards;
    z-index: 100;
    transform: translate(-50%, -50%);
  }
  .spark.cross {
    background: transparent;
    box-shadow:
      0 0 0 0 #fff,
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff;
  }
  .spark.star {
    background: transparent;
    box-shadow:
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff,
      -6px 0 0 #fff, 6px 0 0 #fff,
      0 -6px 0 #fff, 0 6px 0 #fff;
  }
  .spark.dot { background: #fff; }
  @keyframes spark-fly {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.2); opacity: 0; }
  }

  /* ── SNOW PUFF PARTICLES ── */
  .snow-puff {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    box-shadow:
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff;
    pointer-events: none;
    z-index: 60;
    animation: snow-puff-fly 1.2s steps(10) forwards;
    transform: translate(-50%, -50%);
  }
  .snow-puff.small {
    width: 2px; height: 2px;
    box-shadow: -2px 0 0 #fff, 2px 0 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff;
  }
  @keyframes snow-puff-fly {
    0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
    35%  { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx) * 0.75), calc(-50% + var(--dy) * 0.3 + 38px)) scale(0.5); opacity: 0; }
  }

  /* ── FOOTER ── */
  footer {
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    text-align: center;
    z-index: 15;
    pointer-events: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-shadow: 2px 2px 0 var(--ink);
    opacity: 0.85;
  }
  footer .arrow {
    display: inline-block;
    margin-right: 8px;
    color: var(--amber);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.2; }
  }

  /* ── RESET BUTTON ── */
  .reset-btn {
    position: absolute;
    bottom: 50px; right: 16px;
    background: #2a2554;
    color: var(--paper);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    z-index: 20;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow:
      0 0 0 3px var(--ink),
      3px 3px 0 3px rgba(0,0,0,0.45);
    transition: transform 0.05s steps(2);
  }
  .reset-btn:active {
    transform: translate(2px, 2px);
    box-shadow:
      0 0 0 3px var(--ink),
      1px 1px 0 3px rgba(0,0,0,0.45);
  }
  .reset-btn.armed {
    background: var(--amber);
    color: var(--ink);
    text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
  }

  /* ── DEBUG: remove later ── manual lifetime-count setter ── */
  .debug-set {
    position: absolute;
    bottom: 90px;
    right: 16px;
    display: flex;
    gap: 4px;
    z-index: 20;
  }
  .debug-set input {
    width: 70px;
    background: #2a2554;
    color: var(--paper);
    border: none;
    font-family: 'VT323', monospace;
    font-size: 16px;
    padding: 4px 6px;
    outline: none;
    box-shadow:
      0 0 0 3px var(--ink),
      3px 3px 0 3px rgba(0,0,0,0.45);
  }
  .debug-set input::-webkit-outer-spin-button,
  .debug-set input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .debug-set input[type=number] { -moz-appearance: textfield; }
  .debug-set .set-btn {
    background: #2a2554;
    color: var(--paper);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 6px 10px;
    border: none;
    cursor: pointer;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow:
      0 0 0 3px var(--ink),
      3px 3px 0 3px rgba(0,0,0,0.45);
  }
  .debug-set .set-btn:active {
    transform: translate(2px, 2px);
    box-shadow:
      0 0 0 3px var(--ink),
      1px 1px 0 3px rgba(0,0,0,0.45);
  }

  /* ── ACHIEVEMENT PLANETS ── arc above the penguin ── */
  .planet-arc-slot {
    position: absolute;
    /* Size scales with viewport's smaller dimension, bounded so they're
       always visible (>=28px) and never absurdly large (<=60px). */
    width: var(--planet-size);
    height: var(--planet-size);
    z-index: 1;
    opacity: 0;
    /* translate(-50%,-50%) centers the planet on its position coords */
    transform: translate(-50%, -50%) scale(0);
    transition: opacity 0.4s, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    image-rendering: pixelated;
    pointer-events: none;
    filter: drop-shadow(0 0 6px rgba(255, 245, 216, 0.15));
  }
  .planet-arc-slot.unlocked {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .planet-arc-slot svg { width: 100%; height: 100%; display: block; }

  /* Arc positions: each planet's `top` is clamped between two invariants:
       - LOWER BOUND (--arc-min-top): below the HUD by a safety margin
       - UPPER BOUND (--arc-max-top): above the landscape's top edge by a margin
     If the preferred percentage falls outside this band on a small viewport,
     CSS pins it to the appropriate bound. So the arc CAN'T be covered by the
     HUD and CAN'T be hidden behind the landscape, even on tiny screens. */
  .planet-slot-0  { left:  6%; top: clamp(var(--arc-min-top), 38vh, var(--arc-max-top)); }
  .planet-slot-1  { left: 15%; top: clamp(var(--arc-min-top), 32vh, var(--arc-max-top)); }
  .planet-slot-2  { left: 24%; top: clamp(var(--arc-min-top), 28vh, var(--arc-max-top)); }
  .planet-slot-3  { left: 32%; top: clamp(var(--arc-min-top), 25vh, var(--arc-max-top)); }
  .planet-slot-4  { left: 41%; top: clamp(var(--arc-min-top), 23vh, var(--arc-max-top)); }
  .planet-slot-5  { left: 50%; top: clamp(var(--arc-min-top), 22vh, var(--arc-max-top)); }
  .planet-slot-6  { left: 59%; top: clamp(var(--arc-min-top), 23vh, var(--arc-max-top)); }
  .planet-slot-7  { left: 68%; top: clamp(var(--arc-min-top), 25vh, var(--arc-max-top)); }
  .planet-slot-8  { left: 76%; top: clamp(var(--arc-min-top), 28vh, var(--arc-max-top)); }
  .planet-slot-9  { left: 85%; top: clamp(var(--arc-min-top), 32vh, var(--arc-max-top)); }
  .planet-slot-10 { left: 94%; top: clamp(var(--arc-min-top), 38vh, var(--arc-max-top)); }

  /* Celebrating: the dramatic pop-in animation for fresh unlocks */
  .planet-arc-slot.celebrating {
    animation: planet-pop-in 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes planet-pop-in {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(-180deg); opacity: 0; }
    30%  { opacity: 1; }
    60%  { transform: translate(-50%, -50%) scale(1.4) rotate(15deg); opacity: 1; }
    85%  { transform: translate(-50%, -50%) scale(0.9) rotate(-3deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
  }

  /* ── PLANET WIGGLE ── gentle stepped motion, same cadence family
     as the star twinkle (4s steps). Applied to the inner SVG so it
     composes with the slot's centering transform without conflicting. */
  .planet-arc-slot.unlocked svg {
    animation-name: planet-wiggle;
    animation-duration: 4.4s;
    animation-timing-function: steps(4);
    animation-iteration-count: infinite;
    animation-delay: var(--wiggle-delay, 0s);
  }
  @keyframes planet-wiggle {
    0%   { transform: translate(0, 0)    rotate(0deg); }
    25%  { transform: translate(0, -2px) rotate(1deg); }
    50%  { transform: translate(0, 0)    rotate(0deg); }
    75%  { transform: translate(0, 2px)  rotate(-1deg); }
    100% { transform: translate(0, 0)    rotate(0deg); }
  }
  /* Staggered negative delays so the 11 planets don't all bob in lockstep —
     each one starts at a different point in the cycle. CSS vars inherit, so
     the inner SVG picks up the slot's delay. */
  .planet-slot-0  { --wiggle-delay:  0s;   }
  .planet-slot-1  { --wiggle-delay: -0.3s; }
  .planet-slot-2  { --wiggle-delay: -0.9s; }
  .planet-slot-3  { --wiggle-delay: -1.4s; }
  .planet-slot-4  { --wiggle-delay: -2.1s; }
  .planet-slot-5  { --wiggle-delay: -2.6s; }
  .planet-slot-6  { --wiggle-delay: -3.3s; }
  .planet-slot-7  { --wiggle-delay: -3.7s; }
  .planet-slot-8  { --wiggle-delay: -1.1s; }
  .planet-slot-9  { --wiggle-delay: -2.8s; }
  .planet-slot-10 { --wiggle-delay: -0.5s; }

  /* ── ACHIEVEMENT CELEBRATION EFFECTS ── */
  /* Expanding shockwave ring */
  .ach-ring {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid #ffb84d;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%) scale(0.5);
    animation: ach-ring-expand 1s steps(8) forwards;
    box-shadow: 0 0 16px rgba(255, 184, 77, 0.6);
  }
  @keyframes ach-ring-expand {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1;   border-color: #fff5d8; }
    50%  { transform: translate(-50%, -50%) scale(14);  opacity: 0.7; border-color: #ffb84d; }
    100% { transform: translate(-50%, -50%) scale(22);  opacity: 0;   border-color: #ff6a8a; }
  }

  /* Colorful particle bursts */
  .ach-spark {
    position: absolute;
    width: 4px; height: 4px;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    animation: ach-spark-fly 1.4s steps(10) forwards;
  }
  @keyframes ach-spark-fly {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
    40%  { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.4); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx) * 1.2), calc(-50% + var(--dy) * 1.2 + 38px)) scale(0.4); opacity: 0; }
  }

  /* Lingering twinkles after the burst */
  .ach-sparkle {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
    animation: ach-sparkle-twinkle 1.8s steps(6) forwards;
  }
  @keyframes ach-sparkle-twinkle {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    60%  { opacity: 0.6; transform: translate(-50%, -50%) scale(1.4); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  }

  /* No portrait media query needed — all layout invariants (snow position,
     arc band, planet size) are now expressed with clamp()/vmin/vh in the
     universal rules above, so they adapt continuously to ANY viewport
     instead of switching at a single breakpoint. */

  /* ── VERY SHORT VIEWPORTS (e.g., phone in landscape orientation) ──
     On screens where the viewport height is so short that the standard
     200px HUD + 55vh landscape can't both fit with room for the arc
     between them, we shrink everything proportionally. Without this,
     a phone in landscape mode would have the HUD overlap the landscape
     and the arc would have nowhere to go.

     The crossover point: at vh ≈ 589px, the default mode's arc band
     collapses to zero. So we trigger short-mode below 600px, which gives
     ~4px of safety margin at the boundary. */
  @media (max-height: 599px) {
    :root {
      --landscape-height: 38vh;
      --hud-clearance: 130px;
    }
    header { padding: 6px 12px 4px; }
    h1 { font-size: clamp(10px, 2.5vw, 14px); line-height: 1.3; }
    .tagline { font-size: 11px; margin-top: 4px; }
    .counter-panel { top: 54px; gap: 4px; }
    .stat { padding: 4px 10px 2px; min-width: 70px; }
    .stat-label { font-size: 6px; }
    .stat-value { font-size: 20px; }
    .progress-panel { padding: 4px 10px; width: 170px; gap: 8px; }
    .progress-label { font-size: 6px; }
    .progress-threshold { font-size: 13px; min-width: 44px; }
    .progress-track { height: 8px; }
    /* Lower penguin and shrink sprite to fit the shorter landscape. */
    .penguin-wrap { bottom: 3%; }
    .penguin-sprite { height: clamp(140px, 65vh, 240px); }
  }
</style>

  const FRAMES = {
    DIZZY:        [0, 0],
    PEACEFUL:     [1, 0],
    BOP_WINCE:    [2, 0],
    LOOK_LEFT:    [0, 1],
    ARMS_OUT:     [1, 1],
    IDLE:         [2, 1],
    LYING:        [0, 2],
    HAPPY:        [1, 2],
    LOOK_BACK:    [2, 2],
  };

  let sessionCount = 0;
  let totalCount = 0;
  let recentBops = [];
  let isFallen = false;
  let fallTimers = [];
  let resetTimer = null;
  let blinkTimer = null;
  let glanceTimer = null;
  let armFlapTimer = null;
  let currentFrame = 'IDLE';

  const STORAGE_KEY = 'penguin-bopper-total-bops';

  const $ = (id) => document.getElementById(id);
  const penguin = $('penguin');
  const penguinWrap = $('penguin-wrap');
  const sessionEl = $('session-count');
  const totalEl = $('total-count');
  const reactionEl = $('reaction');

  // Inject image URLs as CSS variables
  const docStyle = document.documentElement.style;
  docStyle.setProperty('--sheet', `url(${SHEET_DATA_URL})`);
  docStyle.setProperty('--landscape-img', `url(${LANDSCAPE_DATA_URL})`);

  function setFrame(name) {
    const [col, row] = FRAMES[name];
    penguin.style.setProperty('--col', col);
    penguin.style.setProperty('--row', row);
    currentFrame = name;
  }
  function clearAnimClasses() {
    penguin.classList.remove('idle', 'bopped', 'wobble-l', 'wobble-r',
                             'tip-over', 'lying', 'sit-up', 'shaking', 'pop-up');
    void penguin.offsetWidth;
  }
  function clearFallTimers() {
    fallTimers.forEach(clearTimeout);
    fallTimers = [];
  }

  // ─── STORAGE ──────────────────────────────────────────────
  // Uses localStorage (works on any web page), with fallback to
  // window.storage (Claude artifacts) if localStorage is unavailable.
  function loadTotal() {
    let value = null;
    try {
      value = localStorage.getItem(STORAGE_KEY);
    } catch (e) {}
    if (value === null && window.storage && window.storage.get) {
      // Fallback for Claude artifacts environment
      window.storage.get(STORAGE_KEY).then(r => {
        if (r && r.value) {
          totalCount = parseInt(r.value, 10) || 0;
          totalEl.textContent = totalCount.toLocaleString();
          syncAchievementsSilently();
          updateProgressBar();
        }
      }).catch(() => {});
      return;
    }
    totalCount = parseInt(value, 10) || 0;
    totalEl.textContent = totalCount.toLocaleString();
    syncAchievementsSilently();
    updateProgressBar();
  }
  function saveTotal() {
    try {
      localStorage.setItem(STORAGE_KEY, String(totalCount));
    } catch (e) {
      // Fallback to window.storage
      if (window.storage && window.storage.set) {
        try { window.storage.set(STORAGE_KEY, String(totalCount)); } catch (e2) {}
      }
    }
  }

  // ─── AUDIO ─────────────────────────────────────────────────
  // Web Audio routes to whatever audio output the OS has selected (including
  // Bluetooth headphones) — but on mobile, particularly iOS, the AudioContext
  // starts in 'suspended' state and the very first sound is sometimes silent.
  // We (1) call resume() defensively on every access, (2) prime the context
  // with a silent buffer on creation to "unlock" audio.
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Prime with a silent buffer so the first real sound isn't dropped.
        try {
          const silentBuffer = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
          const source = audioCtx.createBufferSource();
          source.buffer = silentBuffer;
          source.connect(audioCtx.destination);
          source.start(0);
        } catch (e) {}
      }
      catch (e) { return null; }
    }
    // If context got suspended (e.g., backgrounded the page), resume it.
    // resume() returns a promise but for short sounds this is fine to fire-and-forget.
    if (audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }
    return audioCtx;
  }
  function playBop(intensity) {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    const base = 520 + Math.min(intensity * 40, 240);
    osc.frequency.setValueAtTime(base * 0.7, now);
    osc.frequency.exponentialRampToValueAtTime(base, now + 0.04);
    osc.frequency.exponentialRampToValueAtTime(base * 1.4, now + 0.1);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.12, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.22);
  }
  function playRecover() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    [440, 660, 880, 1320].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = now + i * 0.06;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.10, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.24);
    });
  }
  function playLandThump() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.2);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.25, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.32);
  }

  // ─── ACHIEVEMENT FANFARE ─────────────────────────────────────
  // Triumphant ascending arpeggio in C major + sparkle on top.
  function playAchievement() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    // C5, E5, G5, C6, E6, G6 — major arpeggio across two octaves
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1568.00];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = now + i * 0.07;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.12, t + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.42);
    });
    // Sparkly high glissando layered on top
    const oscS = ctx.createOscillator();
    const gainS = ctx.createGain();
    oscS.type = 'triangle';
    oscS.frequency.setValueAtTime(2000, now + 0.2);
    oscS.frequency.exponentialRampToValueAtTime(4200, now + 0.55);
    gainS.gain.setValueAtTime(0.0001, now + 0.2);
    gainS.gain.exponentialRampToValueAtTime(0.06, now + 0.22);
    gainS.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
    oscS.connect(gainS).connect(ctx.destination);
    oscS.start(now + 0.2);
    oscS.stop(now + 0.62);
  }

  // ─── ACHIEVEMENT SYSTEM ──────────────────────────────────────
  // Each planet unlocks when totalCount crosses its threshold.
  // The element ids match `planet-{name}` and the markup carries data-threshold
  // so the array below is the single source of truth.
  const ACHIEVEMENTS = [
    { id: 'mercury',  threshold: 100,     name: 'Mercury'   },
    { id: 'venus',    threshold: 1000,    name: 'Venus'     },
    { id: 'earth',    threshold: 5000,    name: 'Earth'     },
    { id: 'mars',     threshold: 10000,   name: 'Mars'      },
    { id: 'asteroid', threshold: 20000,   name: 'Asteroid'  },
    { id: 'jupiter',  threshold: 35000,   name: 'Jupiter'   },
    { id: 'saturn',   threshold: 50000,   name: 'Saturn'    },
    { id: 'uranus',   threshold: 75000,   name: 'Uranus'    },
    { id: 'neptune',  threshold: 100000,  name: 'Neptune'   },
    { id: 'pluto',    threshold: 500000,  name: 'Pluto'     },
    { id: 'galaxy',   threshold: 1000000, name: 'Milky Way' },
  ];

  // syncAchievementsSilently: set unlocked classes to match current totalCount,
  // without any animation/sound/particles. Used on page load.
  function syncAchievementsSilently() {
    ACHIEVEMENTS.forEach(ach => {
      const el = document.getElementById('planet-' + ach.id);
      if (!el) return;
      if (totalCount >= ach.threshold) el.classList.add('unlocked');
      else el.classList.remove('unlocked');
    });
  }

  // Staggered celebration: if multiple thresholds cross at once (e.g. via the
  // debug setter jumping high), space the fanfares out so they don't pile up.
  let nextCelebrationTime = 0;

  function celebrateUnlock(planetEl) {
    const now = performance.now();
    const stagger = Math.max(0, nextCelebrationTime - now);
    nextCelebrationTime = now + stagger + 280;

    setTimeout(() => {
      // Pop-in animation
      planetEl.classList.add('unlocked');
      planetEl.classList.add('celebrating');
      setTimeout(() => planetEl.classList.remove('celebrating'), 950);

      // Get the planet's screen position for particle origin
      const rect = planetEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      // 1. Shockwave ring
      const ring = document.createElement('div');
      ring.className = 'ach-ring';
      ring.style.left = cx + 'px';
      ring.style.top = cy + 'px';
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 1100);

      // 2. Colorful particle burst (mix of cross-shaped and star-shaped pixels)
      const colors = ['#ffb84d', '#ff6a8a', '#7eb0e8', '#ffffff', '#c4b0e0', '#fffaea', '#fff5d8'];
      const count = 26;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        const isStar = Math.random() < 0.35;
        p.className = 'ach-spark';
        const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
        const dist = 50 + Math.random() * 75;
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.style.background = color;
        p.style.boxShadow = isStar
          ? `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}, -6px 0 0 ${color}, 6px 0 0 ${color}, 0 -6px 0 ${color}, 0 6px 0 ${color}`
          : `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}`;
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        p.style.animationDelay = (Math.random() * 0.1) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1700);
      }

      // 3. Trailing twinkles scattered around the planet
      for (let i = 0; i < 10; i++) {
        const s = document.createElement('div');
        s.className = 'ach-sparkle';
        s.style.left = (cx + (Math.random() - 0.5) * 90) + 'px';
        s.style.top = (cy + (Math.random() - 0.5) * 90) + 'px';
        s.style.animationDelay = (Math.random() * 0.6) + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2500);
      }

      playAchievement();
    }, stagger);
  }

  // checkAchievementCrossings: called after totalCount changes. Fires the
  // celebration for any newly-crossed thresholds and silently hides any
  // planets whose threshold the new count is now below (e.g. after reset).
  function checkAchievementCrossings(prevTotal, newTotal) {
    ACHIEVEMENTS.forEach(ach => {
      const el = document.getElementById('planet-' + ach.id);
      if (!el) return;
      const crossedUp   = prevTotal <  ach.threshold && newTotal >= ach.threshold;
      const crossedDown = prevTotal >= ach.threshold && newTotal <  ach.threshold;
      if (crossedUp) {
        celebrateUnlock(el);
      } else if (crossedDown) {
        el.classList.remove('unlocked');
        el.classList.remove('celebrating');
      }
    });
  }

  // ─── PROGRESS BAR ────────────────────────────────────────────
  // Shows progress from the *last unlocked* threshold to the *next* threshold,
  // so the bar resets to empty each time the player crosses one. When the bar
  // crosses upward (a new stage begins), we snap-reset the width to 0% without
  // a transition, so it doesn't slide backwards across the screen.
  const progressFillEl  = document.getElementById('progress-fill');
  const progressLabelEl = document.getElementById('progress-threshold');
  // Tracks which "stage" we were last in so we can detect a forward crossing.
  let lastProgressStartThreshold;  // undefined initially

  function updateProgressBar() {
    const next = ACHIEVEMENTS.find(ach => totalCount < ach.threshold);

    if (!next) {
      // All achievements unlocked — bar is fully filled forever.
      progressFillEl.style.transition = '';
      progressFillEl.style.width = '100%';
      progressLabelEl.textContent = 'MAX!';
      lastProgressStartThreshold = Infinity;
      return;
    }

    // Find the last threshold the player has *already* crossed (or 0 if none).
    const lastUnlocked = [...ACHIEVEMENTS].reverse().find(ach => totalCount >= ach.threshold);
    const startThreshold = lastUnlocked ? lastUnlocked.threshold : 0;
    const range    = next.threshold - startThreshold;
    const progress = totalCount       - startThreshold;
    const pct      = Math.min(100, Math.max(0, (progress / range) * 100));

    // Detect a *forward* stage transition (player crossed a threshold).
    // Going backwards (reset / debug-set down) doesn't snap — it animates.
    const movedForward = lastProgressStartThreshold !== undefined
                      && startThreshold > lastProgressStartThreshold;

    if (movedForward) {
      // Snap-reset to 0% without transition, then animate up to the new pct.
      progressFillEl.style.transition = 'none';
      progressFillEl.style.width = '0%';
      void progressFillEl.offsetHeight;  // force reflow
      progressFillEl.style.transition = '';
      requestAnimationFrame(() => {
        progressFillEl.style.width = pct + '%';
      });
    } else {
      progressFillEl.style.width = pct + '%';
    }

    // Flash the bar white briefly if we just hit 100% on the previous bop
    // (i.e., the next threshold is *exactly* our current count). This gives
    // the bar a tiny moment of fanfare right before the planet pops in.
    if (totalCount + 1 === next.threshold) {
      progressFillEl.classList.remove('flash');
      void progressFillEl.offsetHeight;
      progressFillEl.classList.add('flash');
      setTimeout(() => progressFillEl.classList.remove('flash'), 420);
    }

    lastProgressStartThreshold = startThreshold;
    progressLabelEl.textContent = next.threshold.toLocaleString();
  }

  const reactions = {
    light:   ['Boop!', 'Boing!', 'Heehee!', 'Yip!', 'Squish!', 'Pop!', 'Tee-hee!', 'Wiggle!'],
    medium:  ['Again!', 'More boops!', 'Tag!', 'Bouncy!', 'Tickly!', 'Yay!', 'Hee hee!', 'Boop me!'],
    heavy:   ['Wheee!', 'Spin spin!', 'Dizzy fun!', 'So bouncy!', 'Tumble time!', 'Woohoo!', 'Floof!'],
    fallen:  ['Plop!', 'Snow nap~', 'I am potato.', 'Cozy!', 'Belly-up!', 'Snoozy.', 'Floof down!'],
    shaking: ['Brrr!', 'Snow flurry!', 'Shake shake!', 'Flffp!'],
    recover: ['Tada!', 'Boing back!', 'Ready!', 'BOOM!', 'Hop hop!']
  };
  function pickReaction(cat) {
    const list = reactions[cat];
    return list[Math.floor(Math.random() * list.length)];
  }
  function showReaction(text, ms = 1100) {
    reactionEl.textContent = text;
    reactionEl.classList.remove('show');
    void reactionEl.offsetWidth;
    reactionEl.classList.add('show');
    clearTimeout(reactionEl._t);
    reactionEl._t = setTimeout(() => reactionEl.classList.remove('show'), ms);
  }

  const SPARK_TYPES = ['cross', 'star', 'dot', 'cross', 'dot'];
  function emitSparks(x, y, count = 6) {
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      const t = SPARK_TYPES[Math.floor(Math.random() * SPARK_TYPES.length)];
      s.className = 'spark ' + t;
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.6;
      const dist = 36 + Math.random() * 44;
      s.style.left = x + 'px';
      s.style.top = y + 'px';
      const color = ['#ffffff', '#ffe09a', '#ffb84d', '#ff9466'][Math.floor(Math.random() * 4)];
      if (t === 'dot') {
        s.style.background = color;
      } else {
        const shadows = t === 'star'
          ? `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}, -6px 0 0 ${color}, 6px 0 0 ${color}, 0 -6px 0 ${color}, 0 6px 0 ${color}`
          : `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}, 0 0 0 ${color}`;
        s.style.boxShadow = shadows;
      }
      s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }
  }

  function emitSnowPuff(count, source = 'feet', spread = 'fan') {
    const rect = penguinWrap.getBoundingClientRect();
    let x = rect.left + rect.width / 2;
    let y;
    if (source === 'feet')  y = rect.bottom - 4;
    else if (source === 'head') y = rect.top + rect.height * 0.25;
    else if (source === 'wide') y = rect.bottom;
    else y = rect.bottom;

    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'snow-puff' + (Math.random() < 0.4 ? ' small' : '');
      let angle, dist;
      if (spread === 'fan') {
        angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.3;
        dist = 30 + Math.random() * 70;
      } else if (spread === 'wide') {
        angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.8;
        dist = 50 + Math.random() * 90;
      } else if (spread === 'radial') {
        angle = Math.random() * Math.PI * 2;
        dist = 25 + Math.random() * 55;
      }
      s.style.left = (x + (Math.random() - 0.5) * rect.width * 0.4) + 'px';
      s.style.top = y + 'px';
      s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1300);
    }
  }

  function returnToIdle() {
    if (isFallen) return;
    clearAnimClasses();
    setFrame('IDLE');
    penguin.classList.add('idle');
  }
  function scheduleBlink() {
    clearTimeout(blinkTimer);
    blinkTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        setFrame('PEACEFUL');
        setTimeout(() => {
          if (currentFrame === 'PEACEFUL' && !isFallen) setFrame('IDLE');
        }, 150);
      }
      scheduleBlink();
    }, 2800 + Math.random() * 4000);
  }
  function scheduleGlance() {
    clearTimeout(glanceTimer);
    glanceTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        const glance = Math.random() < 0.5 ? 'LOOK_LEFT' : 'LOOK_BACK';
        setFrame(glance);
        setTimeout(() => {
          if (currentFrame === glance && !isFallen) setFrame('IDLE');
        }, 800 + Math.random() * 700);
      }
      scheduleGlance();
    }, 6000 + Math.random() * 7000);
  }
  function scheduleArmFlap() {
    clearTimeout(armFlapTimer);
    armFlapTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        setFrame('ARMS_OUT');
        setTimeout(() => {
          if (currentFrame === 'ARMS_OUT' && !isFallen) setFrame('IDLE');
        }, 600);
      }
      scheduleArmFlap();
    }, 10000 + Math.random() * 12000);
  }

  function lightBop() {
    clearAnimClasses();
    setFrame('BOP_WINCE');
    penguin.classList.add('bopped');
    emitSnowPuff(4, 'feet', 'fan');
    showReaction(pickReaction('light'));
    setTimeout(() => { if (!isFallen) setFrame('PEACEFUL'); }, 220);
    setTimeout(() => { if (!isFallen) setFrame('HAPPY'); }, 380);
    setTimeout(() => { if (!isFallen) returnToIdle(); }, 600);
  }
  function mediumBop() {
    clearAnimClasses();
    setFrame('BOP_WINCE');
    const w = Math.random() < 0.5 ? 'wobble-l' : 'wobble-r';
    penguin.classList.add('bopped', w);
    emitSnowPuff(6, 'feet', 'fan');
    showReaction(pickReaction('medium'));
    setTimeout(() => { if (!isFallen) setFrame('PEACEFUL'); }, 260);
    setTimeout(() => { if (!isFallen) setFrame('ARMS_OUT'); }, 460);
    setTimeout(() => { if (!isFallen) returnToIdle(); }, 720);
  }
  function heavyBop() {
    clearAnimClasses();
    setFrame('BOP_WINCE');
    penguin.classList.add('bopped', 'wobble-r');
    emitSnowPuff(10, 'feet', 'fan');
    showReaction(pickReaction('heavy'));
    setTimeout(() => { if (!isFallen) setFrame('DIZZY'); }, 280);
    setTimeout(() => { if (!isFallen) setFrame('ARMS_OUT'); }, 560);
    setTimeout(() => { if (!isFallen) returnToIdle(); }, 820);
  }

  function fall() {
    clearAnimClasses();
    clearFallTimers();
    isFallen = true;
    recentBops = [];
    showReaction(pickReaction('fallen'), 3600);

    setFrame('BOP_WINCE');
    penguin.classList.add('tip-over');
    emitSnowPuff(5, 'feet', 'fan');

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('LYING');
      penguin.classList.add('lying');
      emitSnowPuff(22, 'wide', 'wide');
      playLandThump();
    }, 550));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('DIZZY');
      penguin.classList.add('sit-up');
      showReaction(pickReaction('shaking'), 900);
    }, 1700));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('DIZZY');
      penguin.classList.add('shaking');
      emitSnowPuff(8, 'head', 'radial');
      setTimeout(() => emitSnowPuff(6, 'head', 'radial'), 200);
      setTimeout(() => emitSnowPuff(5, 'head', 'radial'), 400);
    }, 2250));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      clearAnimClasses();
      setFrame('HAPPY');
      penguin.classList.add('pop-up');
      playRecover();
      emitSnowPuff(8, 'feet', 'fan');
      showReaction(pickReaction('recover'), 1100);
    }, 3150));

    fallTimers.push(setTimeout(() => {
      if (!isFallen) return;
      isFallen = false;
      returnToIdle();
    }, 3750));
  }

  function recoverEarly() {
    if (!isFallen) return;
    isFallen = false;
    clearFallTimers();
    clearAnimClasses();
    setFrame('HAPPY');
    penguin.classList.add('pop-up');
    playRecover();
    emitSnowPuff(10, 'feet', 'fan');
    showReaction(pickReaction('recover'), 1100);
    setTimeout(returnToIdle, 600);
  }

  // Track event timing to dedupe pointerdown -> click pairs.
  // We listen to both pointerdown (modern) and click (fallback for unusual
  // input devices that may only emit click events, like some assistive tech
  // or wearable display browsers). When both fire for the same interaction,
  // the click is suppressed.
  let lastEventTime = 0;
  let lastEventWasPointer = false;

  function handleBop(event) {
    if (event.target.closest('.reset-btn')) return;
    if (event.target.closest('.debug-set')) return;  // DEBUG: remove later

    // Dedupe: if a pointerdown just fired, ignore the synthetic click that follows.
    const now = Date.now();
    if (event.type === 'click' && lastEventWasPointer && now - lastEventTime < 600) {
      lastEventWasPointer = false;
      return;
    }
    lastEventTime = now;
    lastEventWasPointer = (event.type === 'pointerdown');

    if (isFallen) { recoverEarly(); return; }

    recentBops.push(now);
    recentBops = recentBops.filter(t => now - t < 2500);

    sessionCount += 1;
    const prevTotal = totalCount;
    totalCount += 1;
    updateCounters();
    saveTotal();
    checkAchievementCrossings(prevTotal, totalCount);
    updateProgressBar();
    playBop(recentBops.length);

    const x = event.clientX || (event.touches && event.touches[0].clientX) || window.innerWidth / 2;
    const y = event.clientY || (event.touches && event.touches[0].clientY) || window.innerHeight / 2;
    emitSparks(x, y, 5 + Math.min(recentBops.length, 6));

    if (recentBops.length >= 6) fall();
    else if (recentBops.length >= 4) heavyBop();
    else if (recentBops.length >= 2) mediumBop();
    else lightBop();
  }

  function updateCounters() {
    sessionEl.textContent = sessionCount.toLocaleString();
    totalEl.textContent = totalCount.toLocaleString();
    sessionEl.classList.remove('pop');
    totalEl.classList.remove('pop');
    void sessionEl.offsetWidth;
    sessionEl.classList.add('pop');
    totalEl.classList.add('pop');
  }

  function makeStars() {
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star' + (Math.random() < 0.3 ? ' plus' : '');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 45 + '%';
      s.style.animationDelay = (Math.random() * 4) + 's';
      document.body.appendChild(s);
    }
  }
  function makeSnow() {
    for (let i = 0; i < 22; i++) {
      const f = document.createElement('div');
      const sizeClass = Math.random() < 0.4 ? 'small' : (Math.random() < 0.2 ? 'big' : '');
      f.className = 'snowflake' + (sizeClass ? ' ' + sizeClass : '');
      f.style.left = Math.random() * 100 + '%';
      f.style.animationDuration = (10 + Math.random() * 14) + 's';
      f.style.animationDelay = (Math.random() * -20) + 's';
      f.style.opacity = 0.5 + Math.random() * 0.45;
      document.body.appendChild(f);
    }
  }

  const resetBtn = $('reset-btn');
  let resetArmed = false;
  resetBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!resetArmed) {
      resetArmed = true;
      resetBtn.textContent = 'CONFIRM?';
      resetBtn.classList.add('armed');
      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        resetArmed = false;
        resetBtn.textContent = 'RESET';
        resetBtn.classList.remove('armed');
      }, 2500);
      return;
    }
    resetArmed = false;
    clearTimeout(resetTimer);
    resetBtn.textContent = 'RESET';
    resetBtn.classList.remove('armed');
    const prevTotalForReset = totalCount;
    totalCount = 0;
    sessionCount = 0;
    saveTotal();
    updateCounters();
    checkAchievementCrossings(prevTotalForReset, totalCount);
    updateProgressBar();
    showReaction('Fresh start!', 1200);
    if (!isFallen) {
      setFrame('HAPPY');
      setTimeout(returnToIdle, 900);
    }
  });

  // Listen to both pointerdown and click. pointerdown handles modern devices
  // (mouse, touch, pen). click acts as a fallback for input devices that may
  // not emit pointer events through the browser's event pipeline. The dedupe
  // in handleBop prevents double-firing.
  document.addEventListener('pointerdown', handleBop);
  document.addEventListener('click', handleBop);

  // ─── DEBUG: manual lifetime-count setter (remove later) ──────
  const setCountInput = $('set-count-input');
  const setCountBtn = $('set-count-btn');
  function applySetCount() {
    const val = parseInt(setCountInput.value, 10);
    if (isNaN(val) || val < 0) {
      setCountInput.value = '';
      return;
    }
    const prevTotalForSet = totalCount;
    totalCount = val;
    saveTotal();
    updateCounters();
    checkAchievementCrossings(prevTotalForSet, totalCount);
    updateProgressBar();
    setCountInput.value = '';
    showReaction('Set to ' + val.toLocaleString() + '!', 1500);
  }
  setCountBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    applySetCount();
  });
  setCountInput.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') {
      e.preventDefault();
      applySetCount();
    }
  });
  // Prevent any interaction with the debug controls from bubbling up as a bop.
  ['pointerdown', 'click', 'touchstart', 'mousedown'].forEach(evt => {
    setCountInput.addEventListener(evt, (e) => e.stopPropagation());
    setCountBtn.addEventListener(evt, (e) => e.stopPropagation());
  });
  // ─── END DEBUG ──────

  // Keyboard fallback: some unusual browsers (assistive tech, wearable display
  // devices) may primarily emit keyboard events. Space and Enter trigger a bop.
  document.addEventListener('keydown', (e) => {
    if (e.target === setCountInput) return;  // don't intercept while typing in debug box
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      // Synthesize a centered event for the spark/particle origins.
      handleBop({
        target: document.body,
        clientX: window.innerWidth / 2,
        clientY: window.innerHeight / 2,
        type: 'keydown'
      });
    }
  });

  makeStars();
  makeSnow();
  loadTotal();
  setFrame('IDLE');
  scheduleBlink();
  scheduleGlance();
  scheduleArmFlap();
})();
</script>
</body>
</html>
