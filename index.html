<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Penguin Bopper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:   #1a1426;   /* deep "outline" black */
    --paper: #f7f1e0;   /* cream / snow */
    --amber: #ffb84d;
    --accent:#ff9a3c;
    --hot:   #ff6a8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; image-rendering: pixelated; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'VT323', monospace;
    color: var(--paper);
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    cursor: pointer;
  }

  /* ── PIXEL SKY ─ stepped horizontal bands, deep night → sunset glow ── */
  body {
    background: linear-gradient(180deg,
      #1a1f3a 0%,   #1a1f3a 10%,
      #2a2754 10%,  #2a2754 20%,
      #3d2f6a 20%,  #3d2f6a 30%,
      #563c7d 30%,  #563c7d 40%,
      #7a4980 40%,  #7a4980 50%,
      #a85e88 50%,  #a85e88 60%,
      #d97a82 60%,  #d97a82 70%,
      #ff9466 70%,  #ff9466 80%,
      #ffbd6b 80%,  #ffbd6b 90%,
      #ffe09a 90%,  #ffe09a 100%
    );
    position: relative;
  }

  /* ── PIXEL STARS ── */
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    animation: twinkle 4s steps(2) infinite;
  }
  .star.plus {
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 1; }
  }

  /* ── PIXEL SNOWFLAKES ── plus-shaped, falling */
  .snowflake {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
    pointer-events: none;
    animation: snow-fall linear infinite;
  }
  .snowflake.small {
    box-shadow: none;
  }
  .snowflake.big {
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff,
      -4px 0 0 #fff, 4px 0 0 #fff,
      0 -4px 0 #fff, 0 4px 0 #fff;
  }
  @keyframes snow-fall {
    from { transform: translate(0, -10vh); }
    to   { transform: translate(30px, 110vh); }
  }

  /* ── HEADER ── pixel font, no shadows, hard kerning */
  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 20px 16px 12px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3.4vw, 22px);
    line-height: 1.4;
    letter-spacing: 0.05em;
    color: var(--paper);
    text-shadow:
      2px 0 0 var(--ink),
      -2px 0 0 var(--ink),
      0 2px 0 var(--ink),
      0 -2px 0 var(--ink),
      2px 2px 0 var(--ink),
      -2px 2px 0 var(--ink),
      4px 4px 0 rgba(0,0,0,0.4);
  }
  h1 .dot {
    color: var(--amber);
    display: inline-block;
    margin: 0 4px;
  }
  .tagline {
    font-family: 'VT323', monospace;
    font-size: 18px;
    margin-top: 12px;
    color: var(--paper);
    opacity: 0.85;
    text-shadow: 2px 2px 0 var(--ink);
    letter-spacing: 0.06em;
  }

  /* ── PIXEL UI PANELS (counters) ── */
  .counter-panel {
    position: absolute;
    top: 92px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    z-index: 10;
    pointer-events: none;
  }
  .stat {
    background: #2a2554;
    padding: 8px 14px 6px;
    min-width: 92px;
    text-align: center;
    /* Pixel-art panel: hard outline + offset drop shadow */
    box-shadow:
      0 0 0 3px var(--ink),
      4px 4px 0 3px rgba(0,0,0,0.45);
  }
  .stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 var(--ink);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'VT323', monospace;
    font-size: 30px;
    line-height: 1;
    color: var(--paper);
    text-shadow: 2px 2px 0 var(--ink);
    letter-spacing: 0.04em;
  }
  .stat-value.pop { animation: pop 0.4s steps(3); }
  @keyframes pop {
    0%   { transform: scale(1);   color: var(--paper); }
    33%  { transform: scale(1.3); color: var(--amber); }
    66%  { transform: scale(1.1); color: var(--hot); }
    100% { transform: scale(1);   color: var(--paper); }
  }

  /* ── STAGE ── */
  .stage {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
  }
  .penguin-wrap {
    position: relative;
    margin-top: 4vh;
    display: grid;
    place-items: center;
  }

  /* ── PENGUIN SPRITE ── 4×3 grid, 96×128 cells */
  .penguin-sprite {
    --col: 1;
    --row: 1;
    height: clamp(220px, 50vh, 340px);
    aspect-ratio: 96 / 128;
    background-image: var(--sheet);
    background-size: 400% 300%;
    background-position:
      calc(var(--col) * 33.3333%)
      calc(var(--row) * 50%);
    background-repeat: no-repeat;
    /* Hard pixel drop-shadow (no blur) */
    filter:
      drop-shadow(0 6px 0 rgba(0,0,0,0.35))
      drop-shadow(0 10px 0 rgba(0,0,0,0.15));
    transform-origin: 50% 92%;
    transition: transform 0.25s steps(4);
  }
  .penguin-sprite.idle {
    animation: breathe 4.2s steps(4) infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.015, 0.985) translateY(-2px); }
  }
  .penguin-sprite.bopped {
    animation: bop-squash 0.45s steps(5);
  }
  @keyframes bop-squash {
    0%   { transform: translateY(0)    scaleY(1)    scaleX(1); }
    20%  { transform: translateY(8px)  scaleY(0.82) scaleX(1.16); }
    50%  { transform: translateY(-10px) scaleY(1.06) scaleX(0.96); }
    100% { transform: translateY(0)    scaleY(1)    scaleX(1); }
  }
  .penguin-sprite.wobble-l { animation: wobble-l 0.6s steps(6); }
  .penguin-sprite.wobble-r { animation: wobble-r 0.6s steps(6); }
  @keyframes wobble-l {
    0%, 100% { transform: rotate(0); }
    30% { transform: rotate(-7deg); }
    65% { transform: rotate(3deg); }
  }
  @keyframes wobble-r {
    0%, 100% { transform: rotate(0); }
    30% { transform: rotate(7deg); }
    65% { transform: rotate(-3deg); }
  }
  .penguin-sprite.fallen {
    animation: fall-over 0.6s steps(6) forwards;
  }
  @keyframes fall-over {
    0%   { transform: rotate(0) translateY(0); }
    60%  { transform: rotate(-78deg) translateY(0); }
    100% { transform: rotate(-78deg) translateY(8px); }
  }
  .penguin-sprite.recover {
    animation: get-up 0.7s steps(7);
  }
  @keyframes get-up {
    0%   { transform: rotate(-78deg) translateY(8px); }
    50%  { transform: rotate(8deg) translateY(-4px); }
    100% { transform: rotate(0) translateY(0); }
  }

  /* ── PIXEL SPEECH BUBBLE ── hard rectangle + stepped SVG tail ── */
  .reaction {
    position: absolute;
    top: -8%;
    left: 76%;
    background: var(--paper);
    color: var(--ink);
    padding: 6px 14px 4px;
    font-family: 'VT323', monospace;
    font-size: 26px;
    line-height: 1;
    letter-spacing: 0.02em;
    /* hard pixel outline */
    box-shadow:
      0 0 0 3px var(--ink),
      4px 4px 0 3px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 5;
  }
  /* Stepped pixel tail — embedded SVG so edges are crisp */
  .reaction::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 14px;
    width: 20px;
    height: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='5' height='7' shape-rendering='crispEdges' viewBox='0 0 5 7'><rect width='5' height='1' fill='%23f7f1e0'/><rect width='1' height='2' y='1' fill='%231a1426'/><rect x='1' y='1' width='3' height='2' fill='%23f7f1e0'/><rect x='4' y='1' width='1' height='2' fill='%231a1426'/><rect x='1' y='3' width='1' height='2' fill='%231a1426'/><rect x='2' y='3' width='1' height='2' fill='%23f7f1e0'/><rect x='3' y='3' width='1' height='2' fill='%231a1426'/><rect x='2' y='5' width='1' height='2' fill='%231a1426'/></svg>");
    background-repeat: no-repeat;
    background-size: 100% 100%;
  }
  .reaction.show {
    opacity: 1;
    transform: translateY(0);
    animation: bubble-pop 0.3s steps(3);
  }
  @keyframes bubble-pop {
    0%   { transform: translateY(4px) scale(0.5); }
    50%  { transform: translateY(-2px) scale(1.15); }
    100% { transform: translateY(0) scale(1); }
  }

  /* ── PIXEL SPARKS ── plus-shaped bursts, no smooth interpolation */
  .spark {
    position: absolute;
    width: 3px; height: 3px;
    pointer-events: none;
    animation: spark-fly 0.7s steps(6) forwards;
    z-index: 100;
    transform: translate(-50%, -50%);
  }
  .spark.cross {
    background: transparent;
    box-shadow:
      0 0 0 0 #fff,
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff;
  }
  .spark.star {
    background: transparent;
    box-shadow:
      -3px 0 0 #fff, 3px 0 0 #fff,
      0 -3px 0 #fff, 0 3px 0 #fff,
      -6px 0 0 #fff, 6px 0 0 #fff,
      0 -6px 0 #fff, 0 6px 0 #fff;
  }
  .spark.dot {
    background: #fff;
  }
  @keyframes spark-fly {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.2); opacity: 0; }
  }

  /* ── PIXEL GROUND ── chunky horizontal snow/ice bands ── */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 24%;
    z-index: 1;
    background: linear-gradient(180deg,
      transparent 0%,         transparent 6%,
      rgba(247,241,224,0.4) 6%, rgba(247,241,224,0.4) 14%,
      #e8eef5 14%,            #e8eef5 28%,
      #c4d6e3 28%,            #c4d6e3 44%,
      #a0bcd0 44%,            #a0bcd0 64%,
      #7a9bb5 64%,            #7a9bb5 82%,
      #5a809a 82%,            #5a809a 100%
    );
  }
  /* Pixel "snow patch" highlight under penguin */
  .ice-patch {
    position: absolute;
    bottom: 9%; left: 50%;
    transform: translateX(-50%);
    width: min(70vw, 360px);
    height: 12px;
    background: #f7f1e0;
    box-shadow:
      0 6px 0 -3px #e8eef5,
      0 10px 0 -5px #d4dfeb;
    z-index: 1;
  }

  /* ── FOOTER HINT ── */
  footer {
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--paper);
    text-shadow: 2px 2px 0 var(--ink);
    opacity: 0.85;
  }
  footer .arrow {
    display: inline-block;
    margin-right: 8px;
    color: var(--amber);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.2; }
  }

  /* ── PIXEL RESET BUTTON ── chunky border + offset shadow ── */
  .reset-btn {
    position: absolute;
    bottom: 50px; right: 16px;
    background: #2a2554;
    color: var(--paper);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    z-index: 20;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow:
      0 0 0 3px var(--ink),
      3px 3px 0 3px rgba(0,0,0,0.45);
    transition: transform 0.05s steps(2);
  }
  .reset-btn:active {
    transform: translate(2px, 2px);
    box-shadow:
      0 0 0 3px var(--ink),
      1px 1px 0 3px rgba(0,0,0,0.45);
  }
  .reset-btn.armed {
    background: var(--amber);
    color: var(--ink);
    text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
  <header>
    <h1>PENGUIN<span class="dot">·</span>BOPPER</h1>
    <div class="tagline">~ a study in joyful boops ~</div>
  </header>

  <div class="counter-panel">
    <div class="stat">
      <div class="stat-label">SESSION</div>
      <div class="stat-value" id="session-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">ALL TIME</div>
      <div class="stat-value" id="total-count">---</div>
    </div>
  </div>

  <div class="stage">
    <div class="penguin-wrap" id="penguin-wrap">
      <div class="reaction" id="reaction">Boop!</div>
      <div class="penguin-sprite idle" id="penguin"></div>
    </div>
  </div>

  <div class="ice-patch"></div>
  <div class="ground"></div>

  <footer>
    <span class="arrow">&gt;</span>TAP THE PENGUIN
  </footer>

  <button class="reset-btn" id="reset-btn">RESET</button>

  const FRAMES = {
    IDLE:        [1, 1],
    BLINK:       [2, 1],
    ALERT:       [0, 1],
    GLANCE_R:    [3, 1],
    LOOK_UP:     [3, 0],
    BOP_LIGHT:   [1, 0],
    BOP_WINCE:   [2, 0],
    BOP_SLEEPY:  [0, 0],
    SURPRISED:   [0, 2],
    HAPPY:       [1, 2],
    TURNED:      [2, 2],
  };

  let sessionCount = 0;
  let totalCount = 0;
  let recentBops = [];
  let isFallen = false;
  let fallTimer = null;
  let resetTimer = null;
  let blinkTimer = null;
  let glanceTimer = null;
  let currentFrame = 'IDLE';

  const STORAGE_KEY = 'penguin-bopper-total-bops';

  const $ = (id) => document.getElementById(id);
  const penguin = $('penguin');
  const sessionEl = $('session-count');
  const totalEl = $('total-count');
  const reactionEl = $('reaction');

  document.documentElement.style.setProperty('--sheet', `url(${SHEET_DATA_URL})`);

  function setFrame(name) {
    const [col, row] = FRAMES[name];
    penguin.style.setProperty('--col', col);
    penguin.style.setProperty('--row', row);
    currentFrame = name;
  }
  function clearAnimClasses() {
    penguin.classList.remove('bopped', 'wobble-l', 'wobble-r', 'fallen', 'recover', 'idle');
    void penguin.offsetWidth;
  }

  // ─── STORAGE ───────────────────────────────────────────────
  async function loadTotal() {
    try {
      const result = await window.storage.get(STORAGE_KEY);
      if (result && result.value) totalCount = parseInt(result.value, 10) || 0;
    } catch (e) { totalCount = 0; }
    totalEl.textContent = totalCount.toLocaleString();
  }
  async function saveTotal() {
    try { await window.storage.set(STORAGE_KEY, String(totalCount)); }
    catch (e) {}
  }

  // ─── AUDIO ─────────────────────────────────────────────────
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    return audioCtx;
  }
  function playBop(intensity) {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    // Use square wave for a more "8-bit" feel
    osc.type = 'square';
    const base = 520 + Math.min(intensity * 40, 240); // pitch goes UP with combo — playful!
    osc.frequency.setValueAtTime(base * 0.7, now);
    osc.frequency.exponentialRampToValueAtTime(base, now + 0.04);
    osc.frequency.exponentialRampToValueAtTime(base * 1.4, now + 0.1);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.12, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.22);
  }
  function playRecover() {
    const ctx = getAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    [440, 660, 880, 1320].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = now + i * 0.06;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.10, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.24);
    });
  }

  // ─── PLAYFUL REACTIONS ─────────────────────────────────────
  // Penguin is ALWAYS having fun. Never hurt, never begging, never sad.
  const reactions = {
    light:   ['Boop!', 'Boing!', 'Heehee!', 'Yip!', 'Squish!', 'Pop!', 'Tee-hee!', 'Wiggle!'],
    medium:  ['Again!', 'More boops!', 'Tag!', 'Bouncy!', 'Tickly!', 'Yay!', 'Hee hee!', 'Boop me!'],
    heavy:   ['Wheee!', 'Spin spin!', 'Dizzy fun!', 'So bouncy!', 'Tumble time!', 'Woohoo!', 'Floof!', 'Bonk-a-doodle!'],
    fallen:  ['Plop!', 'Snow nap~', 'I am potato.', 'Cozy!', 'Belly-up!', '5 more minutes\u2026', 'Snoozy.', 'Floof down!'],
    recover: ['Tada!', 'Up I go!', 'Boing back!', 'Ready!', 'BOOM!', 'Hop hop!', 'Encore!']
  };
  function pickReaction(cat) {
    const list = reactions[cat];
    return list[Math.floor(Math.random() * list.length)];
  }
  function showReaction(text, ms = 1100) {
    reactionEl.textContent = text;
    reactionEl.classList.remove('show');
    void reactionEl.offsetWidth;
    reactionEl.classList.add('show');
    clearTimeout(reactionEl._t);
    reactionEl._t = setTimeout(() => reactionEl.classList.remove('show'), ms);
  }

  // ─── PIXEL SPARK PARTICLES ─────────────────────────────────
  const SPARK_TYPES = ['cross', 'star', 'dot', 'cross', 'dot']; // weighted
  function emitSparks(x, y, count = 6) {
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      const t = SPARK_TYPES[Math.floor(Math.random() * SPARK_TYPES.length)];
      s.className = 'spark ' + t;
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.6;
      const dist = 36 + Math.random() * 44;
      s.style.left = x + 'px';
      s.style.top = y + 'px';
      // Tint some sparks with palette colors
      const color = ['#ffffff', '#ffe09a', '#ffb84d', '#ff9466'][Math.floor(Math.random() * 4)];
      if (t === 'dot') {
        s.style.background = color;
      } else {
        // Recolor box-shadow stars via CSS variable trick — easier: override inline
        const baseShadows = t === 'star'
          ? `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}, -6px 0 0 ${color}, 6px 0 0 ${color}, 0 -6px 0 ${color}, 0 6px 0 ${color}`
          : `-3px 0 0 ${color}, 3px 0 0 ${color}, 0 -3px 0 ${color}, 0 3px 0 ${color}, 0 0 0 ${color}`;
        s.style.boxShadow = baseShadows;
      }
      s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }
  }

  // ─── BOP RESPONSES ────────────────────────────────────────
  function lightBop() {
    clearAnimClasses();
    setFrame('BOP_LIGHT');
    penguin.classList.add('bopped');
    showReaction(pickReaction('light'));
    setTimeout(returnToIdle, 500);
  }
  function mediumBop() {
    clearAnimClasses();
    setFrame('BOP_WINCE');
    const w = Math.random() < 0.5 ? 'wobble-l' : 'wobble-r';
    penguin.classList.add('bopped', w);
    showReaction(pickReaction('medium'));
    setTimeout(returnToIdle, 650);
  }
  function heavyBop() {
    clearAnimClasses();
    setFrame('SURPRISED');
    penguin.classList.add('bopped', 'wobble-r');
    showReaction(pickReaction('heavy'));
    setTimeout(() => {
      if (!isFallen) {
        setFrame('BOP_SLEEPY');
        setTimeout(() => { if (!isFallen) returnToIdle(); }, 600);
      }
    }, 700);
  }
  function fall() {
    clearAnimClasses();
    isFallen = true;
    setFrame('TURNED');
    penguin.classList.add('fallen');
    showReaction(pickReaction('fallen'), 2400);
    recentBops = [];
    clearTimeout(fallTimer);
    fallTimer = setTimeout(recover, 2800);
  }
  function recover() {
    if (!isFallen) return;
    isFallen = false;
    clearTimeout(fallTimer);
    clearAnimClasses();
    setFrame('SURPRISED');
    penguin.classList.add('recover');
    playRecover();
    showReaction(pickReaction('recover'), 1300);
    setTimeout(() => {
      setFrame('HAPPY');
      setTimeout(returnToIdle, 700);
    }, 700);
  }
  function returnToIdle() {
    if (isFallen) return;
    clearAnimClasses();
    setFrame('IDLE');
    penguin.classList.add('idle');
  }

  // ─── BOP HANDLER ──────────────────────────────────────────
  function handleBop(event) {
    if (event.target.closest('.reset-btn')) return;
    if (isFallen) { recover(); return; }

    const now = Date.now();
    recentBops.push(now);
    recentBops = recentBops.filter(t => now - t < 2500);

    sessionCount += 1;
    totalCount += 1;
    updateCounters();
    saveTotal();
    playBop(recentBops.length);

    const x = event.clientX || (event.touches && event.touches[0].clientX) || window.innerWidth / 2;
    const y = event.clientY || (event.touches && event.touches[0].clientY) || window.innerHeight / 2;
    emitSparks(x, y, 5 + Math.min(recentBops.length, 6));

    if (recentBops.length >= 6) fall();
    else if (recentBops.length >= 4) heavyBop();
    else if (recentBops.length >= 2) mediumBop();
    else lightBop();
  }

  function updateCounters() {
    sessionEl.textContent = sessionCount.toLocaleString();
    totalEl.textContent = totalCount.toLocaleString();
    sessionEl.classList.remove('pop');
    totalEl.classList.remove('pop');
    void sessionEl.offsetWidth;
    sessionEl.classList.add('pop');
    totalEl.classList.add('pop');
  }

  // ─── IDLE BEHAVIORS ───────────────────────────────────────
  function scheduleBlink() {
    clearTimeout(blinkTimer);
    blinkTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        setFrame('BLINK');
        setTimeout(() => { if (currentFrame === 'BLINK' && !isFallen) setFrame('IDLE'); }, 140);
      }
      scheduleBlink();
    }, 2500 + Math.random() * 3500);
  }
  function scheduleGlance() {
    clearTimeout(glanceTimer);
    glanceTimer = setTimeout(() => {
      if (currentFrame === 'IDLE' && !isFallen) {
        const glance = ['ALERT', 'GLANCE_R', 'LOOK_UP'][Math.floor(Math.random() * 3)];
        setFrame(glance);
        setTimeout(() => { if (currentFrame === glance && !isFallen) setFrame('IDLE'); }, 700 + Math.random() * 600);
      }
      scheduleGlance();
    }, 5000 + Math.random() * 6000);
  }

  // ─── BACKGROUND DECOR ─────────────────────────────────────
  function makeStars() {
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'star' + (Math.random() < 0.3 ? ' plus' : '');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 45 + '%';
      s.style.animationDelay = (Math.random() * 4) + 's';
      document.body.insertBefore(s, document.body.firstChild);
    }
  }
  function makeSnow() {
    for (let i = 0; i < 22; i++) {
      const f = document.createElement('div');
      const sizeClass = Math.random() < 0.4 ? 'small' : (Math.random() < 0.2 ? 'big' : '');
      f.className = 'snowflake' + (sizeClass ? ' ' + sizeClass : '');
      f.style.left = Math.random() * 100 + '%';
      f.style.animationDuration = (10 + Math.random() * 14) + 's';
      f.style.animationDelay = (Math.random() * -20) + 's';
      f.style.opacity = 0.5 + Math.random() * 0.45;
      document.body.appendChild(f);
    }
  }

  // ─── RESET (two-tap confirm) ──────────────────────────────
  const resetBtn = $('reset-btn');
  let resetArmed = false;
  resetBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!resetArmed) {
      resetArmed = true;
      resetBtn.textContent = 'CONFIRM?';
      resetBtn.classList.add('armed');
      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        resetArmed = false;
        resetBtn.textContent = 'RESET';
        resetBtn.classList.remove('armed');
      }, 2500);
      return;
    }
    resetArmed = false;
    clearTimeout(resetTimer);
    resetBtn.textContent = 'RESET';
    resetBtn.classList.remove('armed');
    totalCount = 0;
    sessionCount = 0;
    await saveTotal();
    updateCounters();
    showReaction('Fresh start!', 1200);
    if (!isFallen) {
      setFrame('HAPPY');
      setTimeout(returnToIdle, 1000);
    }
  });

  document.addEventListener('pointerdown', handleBop);

  makeStars();
  makeSnow();
  loadTotal();
  setFrame('IDLE');
  scheduleBlink();
  scheduleGlance();
})();
</script>
</body>
</html>
