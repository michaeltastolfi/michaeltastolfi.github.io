    const SEASON_KEYS  = ['summer','fall','winter','spring'];
    const TIME_KEYS    = ['dawn','earlymorning','morning','noon','afternoon','evening','midnight'];

    const SEASON_LABELS  = { summer:'Summer', fall:'Fall', winter:'Winter', spring:'Spring' };
    const TIME_LABELS    = { earlymorning:'Early Morning', dawn:'Dawn', morning:'Morning', noon:'Noon', afternoon:'Afternoon', evening:'Evening', midnight:'Midnight' };
    const WEATHER_LABELS = {
      clear:'Clear', cloudy:'Cloudy', foggy:'Foggy', rainy:'Rainy',
      windstorm:'Windstorm', thunderstorm:'Thunderstorm',
      cold:'Cold', hot:'Hot', snowing:'Snowing', blizzard:'Blizzard',
    };

    /* ─── Detection helpers ──────────────────────────────────────────── */
    function getTimePeriod(hour) {
      if (hour >= 4  && hour <= 5)  return 'earlymorning';
      if (hour >= 6  && hour <= 7)  return 'dawn';
      if (hour >= 8  && hour <= 11) return 'morning';
      if (hour >= 12 && hour <= 13) return 'noon';
      if (hour >= 14 && hour <= 17) return 'afternoon';
      if (hour >= 18 && hour <= 21) return 'evening';
      return 'midnight';
    }

    function getSeason(month, lat) {
      const north = ['winter','winter','spring','spring','spring','summer','summer','summer','fall','fall','fall','winter'];
      const south = ['summer','summer','fall','fall','fall','winter','winter','winter','spring','spring','spring','summer'];
      return (lat >= 0 ? north : south)[month];
    }

    function mapToWeather(code, tempC, windKph, season) {
      if (code >= 95) return 'thunderstorm';

      const isSnow = (code >= 71 && code <= 77) || code === 85 || code === 86;
      if (isSnow) {
        const isHeavy = code === 75 || code === 77 || code === 86;
        if (season === 'winter' && isHeavy && windKph >= 40) return 'blizzard';
        return 'snowing';
      }

      const isRain = (code >= 51 && code <= 67) || (code >= 80 && code <= 82);
      if (isRain) return 'rainy';

      if (code === 45 || code === 48) return 'foggy';

      if (windKph >= 50) return 'windstorm';
      if (tempC  >= 30)  return 'hot';
      if (tempC  <=  2)  return 'cold';
      if (code === 2 || code === 3) return 'cloudy';
      return 'clear';
    }

    function getStory(season, time, weather) {
      return STORY_CONTENT[season]?.[time]?.[weather] || null;
    }

    function toHtml(text) {
      return text.trim().split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br/>')}</p>`).join('');
    }

    /* ─── StarField ──────────────────────────────────────────────────── */
    const STAR_TIME_FACTOR = { midnight:1, earlymorning:0.9, dawn:0.55, evening:0.5, morning:0.06, noon:0, afternoon:0.04 };
    const STAR_WEATHER_FACTOR = { clear:1, hot:0.9, cold:0.95, windstorm:0.75, cloudy:0.35, snowing:0.25, foggy:0.15, rainy:0.12, thunderstorm:0.05, blizzard:0.02 };
    const STAR_SEASON_COLOR = { summer:'#ffe8a0', fall:'#f0a030', winter:'#a8d8ff', spring:'#f8f0d0' };

    function StarField({ season, time, weather }) {
      const { color, count } = React.useMemo(() => ({
        color: STAR_SEASON_COLOR[season] ?? '#ffe8a0',
        count: Math.round(90 * (STAR_TIME_FACTOR[time] ?? 1) * (STAR_WEATHER_FACTOR[weather] ?? 1)),
      }), [season, time, weather]);

      const stars = React.useMemo(() => Array.from({ length: count }, (_, i) => ({
        id: i,
        x:        Math.random() * 100,
        y:        Math.random() * 100,
        size:     Math.random() * 2.5 + 0.8,
        opacity:  Math.random() * 0.5 + 0.2,
        duration: Math.random() * 5 + 3,
        delay:    Math.random() * 12,
      })), [count]);

      if (!count) return null;
      return (
        <div style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:0, overflow:'hidden' }}>
          {stars.map(s => (
            <span key={s.id} style={{
              position: 'absolute',
              left: `${s.x}%`, top: `${s.y}%`,
              width: `${s.size}px`, height: `${s.size}px`,
              borderRadius: '50%',
              backgroundColor: color,
              boxShadow: `0 0 ${s.size * 2}px ${s.size}px ${color}88`,
              '--star-opacity': s.opacity,
              opacity: s.opacity,
              animation: `twinkle ${s.duration}s ease-in-out ${s.delay}s infinite`,
            }} />
          ))}
        </div>
      );
    }

    /* ─── ParticleField ──────────────────────────────────────────────── */
    function ParticleField({ season, time, weather }) {
      const cfg = React.useMemo(() => {
        const isSnow  = ['snowing','blizzard'].includes(weather) || (season === 'winter' && weather === 'cold');
        const isRain  = ['rainy','thunderstorm'].includes(weather);
        const isLeaf  = season === 'fall' && !isRain && !isSnow;
        const timeMul = { midnight:1, evening:0.9, dawn:0.65, earlymorning:0.75, morning:0.1, noon:0, afternoon:0.1 };

        if (isSnow) {
          const heavy = weather === 'blizzard';
          return { anim:'float-snow', falling:true, isLeafShape:false, isRect:false,
            color:'#e8f4ff', glow:'0 0 7px 3px rgba(220,240,255,0.65)',
            count: heavy ? 80 : weather === 'snowing' ? 50 : 25,
            minSz:2.5, maxSz:8, minDur: heavy?3:6, maxDur: heavy?7:14,
            dxRange: heavy ? 180 : 60, delayMax: 30 };
        }
        if (isRain) {
          const storm = weather === 'thunderstorm';
          return { anim:'float-rain', falling:true, isLeafShape:false, isRect:true,
            color: storm ? 'rgba(150,190,225,0.8)' : 'rgba(175,210,240,0.65)',
            glow: null, height: storm ? 24 : 18,
            count: storm ? 60 : 40,
            minSz:1.2, maxSz:2, minDur: storm?0.35:0.55, maxDur: storm?0.75:1.0,
            dxRange: storm ? 35 : 15, delayMax: 4 };
        }
        if (isLeaf) {
          const windy = weather === 'windstorm';
          return { anim:'float-leaf', falling:true, isLeafShape:true, isRect:false,
            color: windy ? '#b85e10' : '#c87820',
            glow:`0 0 6px 2px ${windy?'rgba(185,94,16,0.55)':'rgba(200,120,32,0.5)'}`,
            count: windy ? 35 : 22,
            minSz:6, maxSz:16, minDur: windy?3:7, maxDur: windy?8:16,
            dxRange: windy ? 260 : 100, delayMax: 28 };
        }
        // Embers/sparks
        const base = { clear:38, hot:55, windstorm:20, cloudy:10, foggy:8, cold:12, thunderstorm:5 };
        const count = Math.round((base[weather] ?? 14) * (timeMul[time] ?? 1));
        const isHot = weather === 'hot';
        const col = isHot ? '#ff8c00' : season === 'fall' ? '#c86010' : '#d4a020';
        return { anim:'float-ember', falling:false, isLeafShape:false, isRect:false,
          color: col,
          glow:`0 0 8px 4px ${isHot?'rgba(255,140,0,0.70)':season==='fall'?'rgba(200,96,16,0.65)':'rgba(212,160,32,0.65)'}`,
          count, minSz:2, maxSz:7, minDur:10, maxDur:24, dxRange:160, delayMax:30 };
      }, [season, time, weather]);

      const particles = React.useMemo(() => {
        if (!cfg.count) return [];
        return Array.from({ length: cfg.count }, (_, i) => ({
          id:    i,
          x:     Math.random() * 100,
          size:  cfg.minSz + Math.random() * (cfg.maxSz - cfg.minSz),
          dur:   cfg.minDur + Math.random() * (cfg.maxDur - cfg.minDur),
          delay: Math.random() * cfg.delayMax,
          dx:    (Math.random() - 0.5) * 2 * cfg.dxRange,
          rot:   Math.random() * 360,
        }));
      }, [cfg]);

      if (!cfg.count) return null;
      return (
        <div style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:0, overflow:'hidden' }}>
          {particles.map(p => (
            <span key={p.id} style={{
              position: 'absolute',
              left: `${p.x}%`,
              [cfg.falling ? 'top' : 'bottom']: '-20px',
              width:  `${p.size}px`,
              height: cfg.isRect ? `${cfg.height}px` : cfg.isLeafShape ? `${p.size * 1.45}px` : `${p.size}px`,
              borderRadius: cfg.isRect ? '1px' : cfg.isLeafShape ? '50% 0 50% 0' : '50%',
              backgroundColor: cfg.color,
              '--dx': `${p.dx}px`,
              '--rot': `${p.rot}deg`,
              boxShadow: cfg.glow ?? undefined,
              animation: `${cfg.anim} ${p.dur.toFixed(2)}s ease-in ${p.delay.toFixed(2)}s infinite`,
            }} />
          ))}
        </div>
      );
    }

    /* ─── FireflyField ───────────────────────────────────────────────── */
    function FireflyField({ season, time, weather }) {
      const count = React.useMemo(() => {
        if (!['summer','spring'].includes(season)) return 0;
        if (!['evening','midnight','dawn','earlymorning'].includes(time)) return 0;
        if (['rainy','thunderstorm','blizzard','snowing','windstorm'].includes(weather)) return 0;
        const base = season === 'summer' ? 12 : 7;
        const tm = { evening:1, midnight:0.85, dawn:0.35, earlymorning:0.5 };
        return Math.round(base * (tm[time] ?? 1));
      }, [season, time, weather]);

      const flies = React.useMemo(() => Array.from({ length: count }, (_, i) => ({
        id: i,
        x:   5 + Math.random() * 88,
        y:   20 + Math.random() * 60,
        fx:  (Math.random() - 0.5) * 80,
        dur: 5 + Math.random() * 8,
        del: Math.random() * 25,
        sz:  2 + Math.random() * 1.5,
      })), [count]);

      if (!count) return null;
      return (
        <div style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:1, overflow:'hidden' }}>
          {flies.map(f => (
            <span key={f.id} style={{
              position: 'absolute',
              left: `${f.x}%`, top: `${f.y}%`,
              width: `${f.sz}px`, height: `${f.sz}px`,
              borderRadius: '50%',
              backgroundColor: '#c8f050',
              '--fx': `${f.fx}px`,
              boxShadow: '0 0 6px 3px rgba(180,230,60,0.55), 0 0 14px 6px rgba(170,220,50,0.20)',
              animation: `firefly-drift ${f.dur}s ease-in-out ${f.del}s infinite`,
            }} />
          ))}
        </div>
      );
    }

    /* ─── FogField ───────────────────────────────────────────────────── */
    function FogField({ weather }) {
      const layers = React.useMemo(() => Array.from({ length: 7 }, (_, i) => ({
        id: i,
        y:   15 + Math.random() * 68,
        w:   80 + Math.random() * 55,
        h:   10 + Math.random() * 16,
        op:  0.06 + Math.random() * 0.08,
        dur: 40 + Math.random() * 60,
        del: Math.random() * 50,
        bl:  35 + Math.random() * 40,
      })), []);

      if (weather !== 'foggy') return null;
      return (
        <div style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:1, overflow:'hidden' }}>
          {layers.map(l => (
            <div key={l.id} style={{
              position: 'absolute',
              left: '-35%', top: `${l.y}%`,
              width: `${l.w}%`, height: `${l.h}vh`,
              background: 'rgba(210,220,230,0.55)',
              borderRadius: '50%',
              filter: `blur(${l.bl}px)`,
              '--fog-op': l.op,
              animation: `drift-fog ${l.dur}s ease-in-out ${l.del}s infinite`,
            }} />
          ))}
        </div>
      );
    }

    /* ─── App ────────────────────────────────────────────────────────── */
    function App() {
      const [location,   setLocation]   = useState(null);
      const [locError,   setLocError]   = useState(null);
      const [conditions, setConditions] = useState(null);
      const [condError,  setCondError]  = useState(null);
      const [loading,    setLoading]    = useState(true);

      const [overrideSeason,  setOverrideSeason]  = useState('');
      const [overrideTime,    setOverrideTime]    = useState('');
      const [overrideWeather, setOverrideWeather] = useState('');
      const [debugOpen,       setDebugOpen]       = useState(false);

      const now   = new Date();
      const hour  = now.getHours();
      const month = now.getMonth();

      const detectedTime    = getTimePeriod(hour);
      const detectedSeason  = getSeason(month, location ? location.lat : 45);
      const detectedWeather = conditions
        ? mapToWeather(conditions.code, conditions.tempC, conditions.windKph, detectedSeason)
        : null;

      const activeSeason  = overrideSeason  || detectedSeason;
      const activeTime    = overrideTime    || detectedTime;
      const activeWeather = overrideWeather || detectedWeather || 'clear';

      const hasOverride = !!(overrideSeason || overrideTime || overrideWeather);

      useEffect(() => {
        const BG = {
          dawn:         'radial-gradient(ellipse at 50% 115%, #a03c08 0%, #4a1a04 28%, #0d0904 62%)',
          earlymorning: 'radial-gradient(ellipse at 50% -5%,  #16082e 0%, #08041a 55%)',
          morning:      'radial-gradient(ellipse at 50% -5%,  #4a2a06 0%, #1e1204 55%)',
          noon:         'radial-gradient(ellipse at 50% -5%,  #2a2408 0%, #12100a 55%)',
          afternoon:    'radial-gradient(ellipse at 50% -5%,  #3c2006 0%, #1a1004 55%)',
          evening:      'radial-gradient(ellipse at 50% 115%, #380a4c 0%, #1a0628 35%, #08050e 65%)',
          midnight:     'radial-gradient(ellipse at 50% -5%,  #0a0624 0%, #04030e 55%)',
        };
        document.body.style.transition = 'background 2.5s ease';
        document.body.style.background = BG[activeTime] ?? BG.midnight;
      }, [activeTime]);
      const story       = getStory(activeSeason, activeTime, activeWeather);

      useEffect(() => {
        if (!('geolocation' in navigator)) {
          setLocError('Geolocation not supported.');
          setLoading(false);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          p  => setLocation({ lat: p.coords.latitude, lng: p.coords.longitude }),
          () => { setLocError('Location access denied.'); setLoading(false); }
        );
      }, []);

      useEffect(() => {
        if (!location) return;
        (async () => {
          try {
            const res  = await fetch(
              `https://api.open-meteo.com/v1/forecast?latitude=${location.lat}&longitude=${location.lng}&current=weather_code,temperature_2m,wind_speed_10m&timezone=auto`
            );
            const data = await res.json();
            const cur  = data.current ?? {};
            setConditions({
              code:    cur.weather_code   ?? cur.weathercode ?? 0,
              tempC:   cur.temperature_2m ?? 15,
              windKph: cur.wind_speed_10m ?? 0,
            });
          } catch {
            setCondError('Could not fetch weather data.');
            setConditions({ code: 0, tempC: 15, windKph: 0 });
          } finally {
            setLoading(false);
          }
        })();
      }, [location]);

      return (
        <>
        <StarField season={activeSeason} time={activeTime} weather={activeWeather} />
        <ParticleField season={activeSeason} time={activeTime} weather={activeWeather} />
        <FireflyField season={activeSeason} time={activeTime} weather={activeWeather} />
        <FogField weather={activeWeather} />
        <div className="min-h-screen py-12 px-4 sm:px-6 lg:px-8" style={{ position:'relative', zIndex:2 }}>
          <div className="max-w-3xl mx-auto space-y-6">

            {/* ── Header ─────────────────────────────────────────────── */}
            <div className="text-center space-y-3 pt-2 pb-4">
              <div className="text-gold/40 tracking-[0.5em] text-xs font-display select-none">
                ⋆{' '}
                <span style={{ position:'relative', display:'inline-block' }}>
                  ✦
                  <span style={{ position:'absolute', top:'50%', left:'50%', width:'28px', height:'28px', marginTop:'-14px', marginLeft:'-14px', animation:'slow-spin 12s linear infinite', pointerEvents:'none' }}>
                    <span style={{ position:'absolute', top:0, left:'50%', width:'4px', height:'4px', marginLeft:'-2px', marginTop:'-2px', borderRadius:'50%', backgroundColor:'rgba(196,154,26,0.55)', boxShadow:'0 0 6px 2px rgba(196,154,26,0.40)' }} />
                  </span>
                </span>
                {' '}⋆
              </div>
              <h1
                className="text-4xl sm:text-5xl font-display font-bold text-parchment-100 tracking-wider animate-title-breathe"
              >
                Mundane Chronicles
              </h1>
              <div className="text-gold/40 tracking-[0.5em] text-xs font-display select-none">⋆ ✦ ⋆</div>
              <p className="text-parchment-200/45 text-[11px] font-display uppercase tracking-[0.35em]">
                Tales of Oscar the Wizard
              </p>
              <p className="text-parchment-100/30 text-base font-serif italic max-w-sm mx-auto pt-1">
                Synced to your time, weather &amp; season.
              </p>
            </div>

            {/* ── Conditions bar ─────────────────────────────────────── */}
            <div
              className="bg-tower-100 border border-gold/20 rounded-sm px-6 py-4 flex flex-wrap items-center justify-between gap-4"
              style={{ boxShadow: '0 4px 28px rgba(0,0,0,0.55), inset 0 1px 0 rgba(196,154,26,0.08)' }}
            >
              <div className="flex flex-wrap items-center gap-x-8 gap-y-3">
                {[
                  { label: 'Season',      value: SEASON_LABELS[activeSeason],   override: !!overrideSeason },
                  { label: 'Time of Day', value: TIME_LABELS[activeTime],        override: !!overrideTime },
                  { label: 'Weather',     value: WEATHER_LABELS[activeWeather],  override: !!overrideWeather },
                ].map(({ label, value, override }) => (
                  <div key={label}>
                    <p className="text-[10px] font-display uppercase tracking-[0.22em] text-gold/50 mb-0.5">{label}</p>
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-serif text-parchment-100">{value}</span>
                      {override && (
                        <span className="text-[9px] font-display uppercase tracking-wider text-gold border border-gold/40 px-1.5 py-0.5 rounded-sm">
                          Override
                        </span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              <button
                onClick={() => setDebugOpen(d => !d)}
                className="flex items-center gap-1.5 text-[10px] font-display uppercase tracking-widest text-parchment-100/25 hover:text-gold/60 transition-colors"
              >
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-3.5 h-3.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5" />
                </svg>
                Scry
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                  className={`w-3 h-3 transition-transform duration-200 ${debugOpen ? 'rotate-180' : ''}`}>
                  <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clipRule="evenodd"/>
                </svg>
              </button>
            </div>

            {/* ── Scry / Debug panel ─────────────────────────────────── */}
            {debugOpen && (
              <div
                className="bg-tower-200 border border-gold/20 rounded-sm p-6 animate-fade-in space-y-5"
                style={{ boxShadow: '0 4px 28px rgba(0,0,0,0.55)' }}
              >
                <div className="flex items-center justify-between">
                  <h3 className="text-[10px] font-display uppercase tracking-[0.3em] text-gold/60">Override Conditions</h3>
                  {hasOverride && (
                    <button
                      onClick={() => { setOverrideSeason(''); setOverrideTime(''); setOverrideWeather(''); }}
                      className="text-[10px] font-display uppercase tracking-wider text-parchment-100/35 hover:text-gold/60 underline transition-colors"
                    >
                      Restore Live
                    </button>
                  )}
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <div>
                    <label className="block text-[10px] font-display uppercase tracking-[0.2em] text-gold/50 mb-1.5">Season</label>
                    <select
                      value={overrideSeason}
                      onChange={e => setOverrideSeason(e.target.value)}
                      className="w-full rounded-sm border border-gold/20 bg-tower-100 px-3 py-2 text-sm text-parchment-100 font-serif focus:outline-none focus:ring-1 focus:ring-gold/40"
                    >
                      <option value="">— Live: {SEASON_LABELS[detectedSeason]} —</option>
                      {SEASON_KEYS.map(k => <option key={k} value={k}>{SEASON_LABELS[k]}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-[10px] font-display uppercase tracking-[0.2em] text-gold/50 mb-1.5">Time of Day</label>
                    <select
                      value={overrideTime}
                      onChange={e => setOverrideTime(e.target.value)}
                      className="w-full rounded-sm border border-gold/20 bg-tower-100 px-3 py-2 text-sm text-parchment-100 font-serif focus:outline-none focus:ring-1 focus:ring-gold/40"
                    >
                      <option value="">— Live: {TIME_LABELS[detectedTime]} —</option>
                      {TIME_KEYS.map(k => <option key={k} value={k}>{TIME_LABELS[k]}</option>)}

                  </div>
                  <div>
                    <label className="block text-[10px] font-display uppercase tracking-[0.2em] text-gold/50 mb-1.5">Weather</label>
                    <select
                      value={overrideWeather}
                      onChange={e => setOverrideWeather(e.target.value)}
                      className="w-full rounded-sm border border-gold/20 bg-tower-100 px-3 py-2 text-sm text-parchment-100 font-serif focus:outline-none focus:ring-1 focus:ring-gold/40"
                    >
                      <option value="">— Live: {detectedWeather ? WEATHER_LABELS[detectedWeather] : 'Detecting…'} —</option>
                      {WEATHER_BY_SEASON[activeSeason].map(k => <option key={k} value={k}>{WEATHER_LABELS[k]}</option>)}
                    </select>
                  </div>
                </div>

                <div className="text-[11px] font-serif text-parchment-100/30 space-y-1 pt-3 border-t border-gold/15">
                  <p className="font-display uppercase tracking-[0.25em] text-gold/40 text-[10px] mb-2">Live Readings</p>
                  <p>
                    {now.toLocaleString('default', { month: 'long' })} &middot;&nbsp;
                    {location ? (location.lat >= 0 ? 'Northern' : 'Southern') + ' hemisphere' : 'Location unknown'} &rarr;&nbsp;
                    <strong className="text-parchment-100/50">{SEASON_LABELS[detectedSeason]}</strong>
                  </p>
                  <p>Hour {hour}:00 &rarr; <strong className="text-parchment-100/50">{TIME_LABELS[detectedTime]}</strong></p>
                  {location   && <p>Lat {location.lat.toFixed(3)}, Lon {location.lng.toFixed(3)}</p>}
                  {locError   && <p className="text-red-400/70">{locError}</p>}
                  {conditions && (
                    <p>
                      WMO {conditions.code} &middot; {conditions.tempC.toFixed(1)}°C &middot; {conditions.windKph.toFixed(0)} km/h &rarr;&nbsp;
                      <strong className="text-parchment-100/50">{WEATHER_LABELS[detectedWeather]}</strong>
                    </p>
                  )}
                  {condError  && <p className="text-red-400/70">{condError}</p>}
                  {loading    && <p>Fetching weather…</p>}
                </div>
              </div>
            )}

            {/* ── Loading ────────────────────────────────────────────── */}
            {loading && (
              <div
                className="w-full bg-tower-100 border border-gold/20 rounded-sm p-12 min-h-[280px] flex flex-col items-center justify-center"
                style={{ boxShadow: '0 4px 28px rgba(0,0,0,0.55)' }}
              >
                <div className="text-3xl text-gold/50 animate-flicker mb-5 select-none">✦</div>
                <p className="text-parchment-100/35 font-serif italic text-sm">Consulting the elements…</p>
              </div>
            )}

            {/* ── Story card ─────────────────────────────────────────── */}
            {!loading && (
              <div
                className="overflow-hidden rounded-sm animate-fade-in border border-gold/20 animate-card-glow"
              >
                {/* Stone banner */}
                <div className="bg-tower-100 px-8 py-4 border-b border-gold/20">
                  <div className="flex flex-wrap items-center gap-x-2.5 gap-y-1 text-gold/55 text-[11px] font-display uppercase tracking-[0.18em]">
                    <span className="text-gold/35 animate-flicker select-none">✦</span>
                    <span>Oscar the Wizard</span>
                    <span className="text-gold/25">·</span>
                    <span>{SEASON_LABELS[activeSeason]}</span>
                    <span className="text-gold/25">·</span>
                    <span>{TIME_LABELS[activeTime]}</span>
                    <span className="text-gold/25">·</span>
                    <span>{WEATHER_LABELS[activeWeather]}</span>
                  </div>
                </div>

                {/* Parchment body */}
                <div className="parchment-bg parchment-shimmer px-10 py-12 md:px-16 md:py-14">
                  {story ? (
                    <article
                      data-prose
                      className="font-serif text-[1.15rem] leading-[2] text-tower-50/90"
                      dangerouslySetInnerHTML={{ __html: toHtml(story) }}
                    />
                  ) : (
                    <p className="font-serif text-lg text-tower-50/40 italic text-center py-8">
                      No chronicle found for {SEASON_LABELS[activeSeason]} · {TIME_LABELS[activeTime]} · {WEATHER_LABELS[activeWeather]}.
                    </p>
                  )}
                </div>
              </div>
            )}

            {/* ── Footer ─────────────────────────────────────────────── */}
            <div className="text-center text-[10px] font-display tracking-[0.5em] text-parchment-100/12 pb-4 select-none">
              ⋆ ✦ ⋆
            </div>

          </div>
        </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
